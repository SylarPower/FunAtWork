<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pig Racing 🐷🏎️</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            overflow:hidden;
            background:#000;
            font-family:'Segoe UI',sans-serif;
            color:#eee;
            user-select:none;
        }

        canvas#rc {
            position:fixed;
            inset:0;
            z-index:0;
        }

        .overlay {
            position:fixed;
            inset:0;
            display:none;
            justify-content:center;
            align-items:center;
            z-index:100;
            background:rgba(0,0,0,0.88);
        }
        .overlay.active { display:flex; }

        .menu-box, .lobby-box, .results-box {
            background:#1e1e1e;
            border:2px solid #333;
            border-radius:20px;
            width:min(920px, 94vw);
            max-height:92vh;
            overflow:auto;
            padding:28px;
            box-shadow:0 15px 40px rgba(0,0,0,.45);
        }

        .menu-box h1 {
            color:#03dac6;
            font-size:2.2rem;
            margin-bottom:6px;
            text-align:center;
        }

        .menu-sub {
            text-align:center;
            opacity:.72;
            margin-bottom:18px;
        }

        .menu-grid {
            display:grid;
            grid-template-columns: 1.15fr .85fr;
            gap:20px;
            margin-top:10px;
        }

        .panel {
            background:#252525;
            border:1px solid #3a3a3a;
            border-radius:14px;
            padding:16px;
        }

        .panel h3 {
            color:#03dac6;
            margin-bottom:12px;
            font-size:1rem;
        }

        #track-select {
            display:grid;
            grid-template-columns: repeat(3, 1fr);
            gap:12px;
        }

        .track-card {
            background:#2d2d2d;
            border:2px solid transparent;
            border-radius:12px;
            padding:14px 10px;
            text-align:center;
            cursor:pointer;
            transition:.18s;
        }
        .track-card:hover {
            transform:translateY(-2px);
            border-color:#555;
        }
        .track-card.selected {
            border-color:#03dac6;
            background:#173636;
        }

        .opt-row {
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            margin:12px 0;
        }

        .opt-row label {
            font-weight:700;
            min-width:120px;
            font-size:.95rem;
        }

        .opt-row select {
            flex:1;
            padding:10px;
            background:#2c2c2c;
            color:#eee;
            border:1px solid #444;
            border-radius:8px;
            font-size:.95rem;
        }

        .btn-row {
            display:flex;
            flex-wrap:wrap;
            gap:10px;
            justify-content:center;
            margin-top:18px;
        }

        .btn {
            padding:12px 22px;
            border-radius:10px;
            border:1px solid #555;
            background:#1e1e1e;
            color:#eee;
            cursor:pointer;
            font-weight:700;
            font-size:.98rem;
            transition:all .15s;
        }
        .btn:hover { background:#2d2d2d; transform:scale(1.03); }
        .btn:active { transform:scale(0.97); }

        .btn-go {
            background:#e74c3c !important;
            color:#fff !important;
            border:none !important;
        }
        .btn-alt {
            background:#03dac6 !important;
            color:#000 !important;
            border:none !important;
        }
        .btn-home {
            background:#444 !important;
            color:#fff !important;
        }

        .cosmetic-grid {
            display:grid;
            grid-template-columns: 1fr 1fr;
            gap:12px;
        }

        #hud {
            position:fixed;
            inset:0;
            z-index:10;
            pointer-events:none;
            display:none;
        }
        #hud.active { display:block; }

        .hud-tl { position:absolute; top:15px; left:20px; }
        .hud-tc { position:absolute; top:15px; left:50%; transform:translateX(-50%); }
        .hud-tr { position:absolute; top:15px; right:20px; }
        .hud-br { position:absolute; bottom:20px; right:20px; }
        .hud-bl { position:absolute; bottom:20px; left:20px; }

        .hud-box {
            background:rgba(0,0,0,0.7);
            padding:8px 14px;
            border-radius:10px;
            backdrop-filter:blur(4px);
            border:1px solid rgba(255,255,255,0.08);
        }

        #pos-display {
            font-size:2.6rem;
            font-weight:900;
            color:#f1c40f;
            text-shadow:2px 2px 4px #000;
        }

        #lap-display, #speed-display, #timer-display {
            font-size:1.05rem;
            font-weight:700;
        }

        #item-slot-wrap {
            display:flex;
            flex-direction:column;
            align-items:flex-end;
            gap:10px;
        }

        #item-slot {
            width:64px;
            height:64px;
            background:rgba(0,0,0,0.8);
            border:3px solid #555;
            border-radius:12px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:2rem;
        }

        #minimap {
            border:2px solid rgba(255,255,255,0.28);
            border-radius:8px;
            background:rgba(0,0,0,0.6);
        }

        #board {
            font-size:.82rem;
            min-width:180px;
            max-width:240px;
        }

        .wrong-way {
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            font-size:3rem;
            font-weight:900;
            color:#e74c3c;
            text-shadow:0 0 20px rgba(231,76,60,0.8);
            z-index:50;
            display:none;
            pointer-events:none;
        }
        .wrong-way.show { display:block; }

        #countdown-overlay {
            z-index:200;
            background:rgba(0,0,0,0.45);
            font-size:11rem;
            font-weight:900;
            color:#f1c40f;
            text-shadow:0 0 40px rgba(241,196,15,0.6);
        }

        .lobby-box h2, .results-box h2 {
            color:#03dac6;
            margin-bottom:10px;
            text-align:center;
        }

        #lobby-players {
            margin-top:18px;
        }

        .results-box {
            background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
            border:3px solid #f1c40f;
        }

        #res-title {
            color:#f1c40f;
            font-size:2rem;
            text-align:center;
            margin-bottom:16px;
        }

        #res-table {
            width:100%;
        }

        #res-table tr:nth-child(odd) {
            background:rgba(255,255,255,0.04);
        }

        .result-chip {
            display:inline-block;
            padding:8px 12px;
            margin:5px;
            border-radius:999px;
            background:rgba(255,255,255,.08);
            font-size:.92rem;
        }

        #lap-stats, #results-legend, #results-extra {
            margin-top:16px;
        }

        #results-actions {
            margin-top:18px;
            text-align:center;
        }

        .legend-row {
            margin:4px 0;
            font-size:.92rem;
        }

        @media (max-width: 860px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }
            #track-select {
                grid-template-columns: 1fr;
            }
            .cosmetic-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <canvas id="rc"></canvas>

    <!-- HUD -->
    <div id="hud">
        <div class="hud-tl">
            <div class="hud-box">
                <span id="pos-display">1°</span>
            </div>
        </div>

        <div class="hud-tc" style="display:flex;flex-direction:column;gap:8px;align-items:center;">
            <div class="hud-box"><span id="lap-display">Giro 1/3</span></div>
        </div>

        <div class="hud-tr" style="display:flex;flex-direction:column;gap:8px;align-items:flex-end;">
            <div class="hud-box"><span id="speed-display">0 km/h</span></div>
            <div class="hud-box"><span id="timer-display">0:00.00</span></div>
        </div>

        <div class="hud-br" id="item-slot-wrap">
            <div id="item-slot"><span id="item-box"></span></div>
            <canvas id="minimap" width="170" height="170"></canvas>
        </div>

        <div class="hud-bl">
            <div class="hud-box" id="board"></div>
        </div>
    </div>

    <div id="wrong-way" class="wrong-way">⚠️ CONTROMANO!</div>

    <!-- MENU -->
    <div id="menu-overlay" class="overlay active">
        <div class="menu-box">
            <h1>🐷 PIG RACING 🏎️</h1>
            <div class="menu-sub">Corri con i maialini sul circuito!</div>

            <div class="menu-grid">
                <div class="panel">
                    <h3>🏁 Piste</h3>
                    <div id="track-select"></div>
                </div>

                <div class="panel">
                    <h3>⚙️ Configurazione</h3>

                    <div class="opt-row">
                        <label for="sel-laps">🔄 Giri</label>
                        <select id="sel-laps">
                            <option value="1">1 Giro</option>
                            <option value="3" selected>3 Giri</option>
                            <option value="5">5 Giri</option>
                        </select>
                    </div>

                    <div class="opt-row">
                        <label for="sel-bots">🤖 Bot</label>
                        <select id="sel-bots">
                            <option value="0">Nessuno</option>
                            <option value="1">1 Bot</option>
                            <option value="2">2 Bot</option>
                            <option value="3" selected>3 Bot</option>
                            <option value="4">4 Bot</option>
                        </select>
                    </div>

                    <div class="opt-row">
                        <label for="sel-diff">📊 Difficoltà</label>
                        <select id="sel-diff">
                            <option value="easy">Facile</option>
                            <option value="medium" selected>Media</option>
                            <option value="hard">Difficile</option>
                        </select>
                    </div>

                    <h3 style="margin-top:18px;">🎨 Kart & Maiale</h3>
                    <div class="cosmetic-grid">
                        <div class="opt-row" style="margin:0;">
                            <label for="kart-select">Kart</label>
                            <select id="kart-select">
                                <option value="classic">Classic</option>
                                <option value="sport">Sport</option>
                                <option value="chunky">Chunky</option>
                                <option value="tractor">Tractor</option>
                            </select>
                        </div>

                        <div class="opt-row" style="margin:0;">
                            <label for="pig-select">Maiale</label>
                            <select id="pig-select">
                                <option value="pink">Pink</option>
                                <option value="dark">Dark</option>
                                <option value="helmet">Helmet</option>
                                <option value="cap">Cap</option>
                            </select>
                        </div>
                    </div>

                    <div class="btn-row">
                        <button class="btn btn-go" id="btn-start-solo">🏁 AVVIA SOLO</button>
                        <button class="btn btn-alt" id="btn-host-start" style="display:none;">🎮 AVVIA ONLINE</button>
                        <button class="btn btn-home" onclick="window.location.href='index.html'">🏠 HOME</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- LOBBY -->
    <div id="lobby-overlay" class="overlay">
        <div class="lobby-box">
            <h2 id="lobby-title">🏎️ SALA D'ATTESA</h2>
            <p style="text-align:center;opacity:.8;">Attesa sincronizzazione giocatori...</p>
            <div id="lobby-players"></div>
            <div class="btn-row" style="margin-top:20px;">
                <button class="btn btn-home" onclick="window.location.href='index.html'">🏠 HOME</button>
            </div>
        </div>
    </div>

    <!-- COUNTDOWN -->
    <div id="countdown-overlay" class="overlay"></div>

    <!-- RESULTS -->
    <div id="results-overlay" class="overlay">
        <div class="results-box">
            <div style="font-size:4rem;text-align:center;margin-bottom:10px;">🏁</div>
            <h2 id="res-title">RISULTATI</h2>

            <table style="width:100%;border-collapse:collapse;">
                <tbody id="res-table"></tbody>
            </table>

            <div id="results-extra"></div>
            <div id="lap-stats"></div>
            <div id="results-legend"></div>

            <div id="results-actions">
                <button class="btn btn-go" id="btn-rematch">🔄 RIVINCITA</button>
                <button class="btn btn-home" id="btn-back-menu">🏠 MENU</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey:"AIzaSyCNo7o2Ft22JDEyJ97BspE3Kur5DNAPKQc",
            authDomain:"funatwork-cd237.firebaseapp.com",
            projectId:"funatwork-cd237",
            storageBucket:"funatwork-cd237.firebasestorage.app",
            messagingSenderId:"798226885203",
            appId:"1:798226885203:web:ce83f4d9e96b82266274a6"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('matchId');
        let mioNome = localStorage.getItem('mioNome') || 'PLAYER';

        if (!mioNome && matchId) {
            alert("Effettua il login.");
            window.location.href = "index.html";
        }

        if (!mioNome) mioNome = 'PLAYER';

        window.db = db;
        window.matchId = matchId;
        window.mioNome = mioNome;
        window.isHost = false;

        if (matchId) {
            db.collection("partite").doc(matchId).get().then(doc => {
                const data = doc.data() || {};
                window.isHost = !!(data.partecipanti && data.partecipanti[0] === mioNome);
            }).catch(() => {});
        }

        if (window.opener && typeof window.opener.registraPartita === 'function') {
            window.registraPartita = window.opener.registraPartita;
        }
        if (!window.registraPartita && localStorage.getItem('mioNome')) {
            window.registraPartita = function(gioco) {
                const STATS_KEY = 'funatwork_daily_stats';
                const oggi = new Date().toISOString().split('T')[0];
                const stats = JSON.parse(localStorage.getItem(STATS_KEY) || '{"days":{},"totals":{}}');
                if (!stats.days[oggi]) stats.days[oggi] = {};
                stats.days[oggi][gioco] = (stats.days[oggi][gioco] || 0) + 1;
                stats.totals[gioco] = (stats.totals[gioco] || 0) + 1;
                localStorage.setItem(STATS_KEY, JSON.stringify(stats));
            };
        }
    </script>

    <script src="racing.js"></script>
</body>
</html>
