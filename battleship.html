<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Battaglia Navale dei 🐷</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ocean: #1a5276;
            --ocean-deep: #0b1a2e;
            --ocean-light: #2e86c1;
            --ocean-shimmer: rgba(255,255,255,0.06);
            --ship-color: #566573;
            --ship-light: #85929e;
            --ship-accent: #aeb6bf;
            --hit-color: #e74c3c;
            --miss-color: rgba(255,255,255,0.35);
            --sunk-color: #7b241c;
            --target-color: #f1c40f;
            --preview-valid: rgba(46, 204, 113, 0.45);
            --preview-invalid: rgba(231, 76, 60, 0.45);
            --bg: #0a1628;
            --panel: #1c2833;
            --panel-light: #273746;
            --text: #ecf0f1;
            --text-dim: #85929e;
            --accent: #3498db;
            --accent2: #e74c3c;
            --success: #27ae60;
            --warning: #f39c12;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
        body {
            font-family: 'Roboto', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0; padding: 10px;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        .app-wrapper { width: 100%; max-width: 1100px; }

        /* HEADER */
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .header-bar h1 { margin: 0; font-size: 1.4rem; }

        /* STATUS BAR */
        .status-bar {
            background: var(--panel); padding: 10px 15px; border-radius: 8px;
            margin-bottom: 10px; display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 8px;
        }
        .status-item { font-size: 0.85rem; display: flex; align-items: center; gap: 5px; }
        .status-val { font-weight: 900; color: var(--accent); }

        /* GAME CONTAINER */
        .game-container { display: flex; flex-direction: column; gap: 15px; }
        @media (min-width: 800px) {
            .game-container { flex-direction: row; gap: 20px; }
            .my-section { flex: 0 0 45%; }
            .opponent-section { flex: 1; }
        }
        .grid-section { background: var(--panel); border-radius: 10px; padding: 12px; }
        .section-title {
            font-size: 0.85rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 8px;
            display: flex; align-items: center; gap: 8px;
        }

        /* ==========================================
           🌊 BATTLE GRID + WAVE EFFECTS
           ========================================== */
        .battle-grid {
            display: grid; gap: 2px;
            background: var(--ocean-deep);
            padding: 2px; border-radius: 8px;
            aspect-ratio: 1; width: 100%;
            position: relative;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 4px 20px rgba(0,0,0,0.3);
        }
        .coord-label {
            display: flex; justify-content: center; align-items: center;
            font-size: 0.65rem; font-weight: 700; color: var(--text-dim);
            user-select: none;
        }

        /* 🌊 CELLE OCEANO CON ONDE */
        .cell {
            background: var(--ocean);
            border-radius: 3px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; position: relative;
            transition: background 0.15s, transform 0.1s, box-shadow 0.2s;
            user-select: none; font-size: 0.9rem;
            overflow: hidden;
        }
        /* Shimmer delle onde */
        .cell::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(
                135deg,
                transparent 20%,
                var(--ocean-shimmer) 45%,
                transparent 70%
            );
            background-size: 250% 250%;
            animation: waveShimmer var(--wave-speed, 5s) var(--wave-delay, 0s) ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        .cell > * { position: relative; z-index: 1; }
        .cell:hover:not(.no-hover) { filter: brightness(1.3); box-shadow: 0 0 8px rgba(52,152,219,0.4); }
        .cell:active:not(.no-hover) { transform: scale(0.94); }
        .cell.no-hover:hover { filter: none; box-shadow: none; }
        .cell.no-hover { cursor: default; }

        @keyframes waveShimmer {
            0%   { background-position: 200% 200%; }
            50%  { background-position: 0% 0%; }
            100% { background-position: 200% 200%; }
        }

        /* ==========================================
           🚢 NAVI SUL GRID
           ========================================== */
        .cell.ship-cell {
            background: linear-gradient(145deg, var(--ship-color), #4a5568);
            border: 1px solid var(--ship-light);
            box-shadow: inset 0 1px 3px rgba(255,255,255,0.1);
        }
        .cell.ship-cell::before { display: none; } /* No onde sulle navi */

        /* Forme nave: prua, corpo, poppa */
        .cell.ship-bow-h { border-radius: 50% 4px 4px 50%; }
        .cell.ship-stern-h { border-radius: 4px 50% 50% 4px; }
        .cell.ship-bow-v { border-radius: 50% 50% 4px 4px; }
        .cell.ship-stern-v { border-radius: 4px 4px 50% 50%; }
        .cell.ship-mid-h { border-radius: 3px; }
        .cell.ship-mid-v { border-radius: 3px; }
        .cell.ship-single { border-radius: 50%; }

        /* Emoji nave (prua) */
        .ship-emoji {
            font-size: 1.6em;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7));
            line-height: 1;
        }

        /* Nave colpita */
        .cell.ship-hit {
            background: linear-gradient(145deg, #c0392b, #e74c3c) !important;
            border-color: #a93226 !important;
        }
        .cell.ship-hit .hit-fire { font-size: 1.1em; }
        .cell.ship-hit.anim-new { animation: hitFlash 0.5s ease; }
        .cell.ship-hit.anim-new .hit-fire { animation: fireFlicker 0.4s ease-in-out 3; }

        /* Nave affondata */
        .cell.sunk-cell {
            background: linear-gradient(145deg, var(--sunk-color), #5b2c20) !important;
            border: 1px solid #e74c3c !important;
        }
        .cell.sunk-cell.anim-new { animation: sinkAnim 0.8s ease; }
        .cell.sunk-cell::after { content: '💀'; font-size: 1.3em; z-index: 1; position: relative; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6)); }
        .cell.sunk-cell::before { display: none; }

        /* Marcatori attacco (griglia avversario) */
        .cell.hit-marker {
            background: linear-gradient(145deg, #c0392b, #e74c3c) !important;
        }
        .cell.hit-marker::after {
            content: '🔥'; font-size: 1.3em;
            position: relative; z-index: 1;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
        }
        .cell.hit-marker::before { display: none; }

        .cell.miss-marker::after {
            content: '';
            width: 28%; height: 28%;
            background: var(--miss-color);
            border-radius: 50%;
            position: absolute; z-index: 1;
            box-shadow: 0 0 6px rgba(255,255,255,0.2);
        }

        /* Preview piazzamento */
        .cell.preview-valid {
            background: var(--preview-valid) !important;
            border: 2px dashed #2ecc71 !important;
            box-shadow: 0 0 10px rgba(46,204,113,0.3);
        }
        .cell.preview-invalid {
            background: var(--preview-invalid) !important;
            border: 2px dashed #e74c3c !important;
            box-shadow: 0 0 10px rgba(231,76,60,0.3);
        }

        /* Bersaglio selezionato */
        .cell.target-cell {
            background: var(--target-color) !important;
            box-shadow: 0 0 12px rgba(241,196,15,0.5);
            animation: pulseTarget 0.8s infinite;
        }
        .cell.target-cell::before { display: none; }
        .cell.attacked-cell { cursor: not-allowed; opacity: 0.7; }

        @keyframes pulseTarget {
            0%, 100% { box-shadow: 0 0 5px rgba(241,196,15,0.4); }
            50% { box-shadow: 0 0 15px rgba(241,196,15,0.7); }
        }
        @keyframes hitFlash {
            0% { transform: scale(1); filter: brightness(1); }
            30% { transform: scale(1.15); filter: brightness(2); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        @keyframes fireFlicker {
            0%, 100% { transform: scale(1) rotate(-5deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }
        @keyframes sinkAnim {
            0% { transform: scale(1) rotate(0); opacity: 1; }
            40% { transform: scale(0.85) rotate(4deg); opacity: 0.5; }
            70% { transform: scale(0.9) rotate(-2deg); opacity: 0.7; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
        @keyframes missRipple {
            0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.3); }
            100% { box-shadow: 0 0 0 8px rgba(255,255,255,0); }
        }
        .cell.anim-miss { animation: missRipple 0.6s ease-out; }

        /* ==========================================
           📋 LISTA NAVI (Piazzamento)
           ========================================== */
        .ship-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
        .ship-item {
            background: var(--panel-light); padding: 10px 12px; border-radius: 8px;
            display: flex; align-items: center; gap: 12px;
            cursor: pointer; border: 2px solid transparent; transition: all 0.2s;
        }
        .ship-item:hover { border-color: var(--accent); background: rgba(52,152,219,0.1); }
        .ship-item.selected {
            border-color: var(--target-color);
            background: rgba(241,196,15,0.12);
            box-shadow: 0 0 15px rgba(241,196,15,0.15);
        }
        .ship-item.placed { opacity: 0.5; border-color: var(--success); }
        .ship-item.placed::after { content: '✅'; margin-left: auto; font-size: 1.1rem; }

        /* Blocchetti nave nella lista */
        .ship-blocks { display: flex; gap: 1px; }
        .ship-block {
            width: 20px; height: 20px;
            background: linear-gradient(145deg, var(--ship-color), #4a5568);
            border: 1px solid var(--ship-light);
        }
        .ship-block:first-child { border-radius: 50% 3px 3px 50%; }
        .ship-block:last-child { border-radius: 3px 50% 50% 3px; }
        .ship-block:only-child { border-radius: 50%; }

        .ship-name { font-size: 0.8rem; font-weight: 700; min-width: 100px; }
        .ship-size-label { font-size: 0.7rem; color: var(--text-dim); }

        /* ==========================================
           🎯 TABS AVVERSARI
           ========================================== */
        .opponent-tabs {
            display: flex; gap: 5px; margin-bottom: 8px;
            overflow-x: auto; padding-bottom: 5px;
        }
        .tab-btn {
            padding: 6px 14px; border: 2px solid var(--panel-light);
            border-radius: 20px; background: var(--panel-light);
            color: var(--text); cursor: pointer; font-size: 0.8rem;
            font-weight: 700; white-space: nowrap; transition: all 0.2s;
        }
        .tab-btn:hover { border-color: var(--accent); }
        .tab-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
        .tab-btn.eliminated { opacity: 0.4; text-decoration: line-through; }

        /* ==========================================
           🔘 PULSANTI
           ========================================== */
        .btn {
            padding: 10px 20px; border: 2px solid var(--panel-light);
            border-radius: 6px; background: var(--panel); color: var(--text);
            cursor: pointer; font-weight: 700; font-size: 0.9rem;
            transition: all 0.2s; text-transform: uppercase;
        }
        .btn:hover { background: var(--panel-light); }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .btn-primary { background: var(--accent) !important; border-color: var(--accent) !important; color: white !important; }
        .btn-danger { background: var(--accent2) !important; border-color: var(--accent2) !important; color: white !important; }
        .btn-success { background: var(--success) !important; border-color: var(--success) !important; color: white !important; }
        .btn-fire {
            background: linear-gradient(135deg, #e74c3c, #c0392b) !important;
            border: none !important; color: white !important;
            font-size: 1.1rem; padding: 12px 30px; letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(231,76,60,0.4);
        }
        .btn-fire:not(:disabled):hover {
            box-shadow: 0 6px 25px rgba(231,76,60,0.6); transform: scale(1.03);
        }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .direction-btn { font-size: 1.4rem; padding: 8px 14px; }
        .placement-controls {
            display: flex; gap: 8px; align-items: center;
            flex-wrap: wrap; margin-top: 10px;
        }

        /* ==========================================
           📊 RISULTATI TURNO
           ========================================== */
        .round-results-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.92);
            z-index: 5000; display: none; justify-content: center;
            align-items: center; flex-direction: column; padding: 20px;
        }
        .round-results-box {
            background: var(--panel); border: 2px solid var(--accent);
            border-radius: 15px; padding: 25px; max-width: 500px;
            width: 90%; text-align: center; max-height: 80vh; overflow-y: auto;
        }
        .result-line {
            padding: 8px; margin: 5px 0; border-radius: 6px;
            font-size: 0.9rem; display: flex; align-items: center;
            justify-content: center; gap: 8px;
        }
        .result-hit { background: rgba(231,76,60,0.2); border: 1px solid #e74c3c; }
        .result-miss { background: rgba(255,255,255,0.05); border: 1px solid #555; }
        .result-sunk { background: rgba(146,43,33,0.3); border: 1px solid #922b21; }
        .result-eliminated { background: rgba(241,196,15,0.2); border: 2px solid #f1c40f; font-weight: 900; }

        /* WAITING */
        .waiting-bar {
            background: var(--panel-light); padding: 10px; border-radius: 6px;
            text-align: center; font-size: 0.85rem; margin-top: 8px;
        }
        .waiting-bar .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid white; border-top-color: transparent;
            border-radius: 50%; animation: spin 1s linear infinite;
            vertical-align: middle; margin-right: 5px;
        }

        /* FLEET STATUS */
        .fleet-status { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
        .fleet-ship-indicator {
            font-size: 0.7rem; padding: 2px 6px; border-radius: 3px;
            background: var(--ship-color); transition: all 0.3s;
        }
        .fleet-ship-indicator.sunk {
            background: var(--sunk-color); text-decoration: line-through;
        }

        /* BANNER */
        .game-banner {
            position: fixed; top: 0; left: 0; right: 0;
            padding: 12px 20px; display: flex; justify-content: space-between;
            align-items: center; z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: slideDown 0.3s ease; color: white; flex-wrap: wrap;
        }
        .game-banner .banner-left { display: flex; align-items: center; gap: 10px; }
        .game-banner .banner-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        @media (max-width: 600px) {
            .game-banner { flex-direction: column; text-align: center; gap: 10px; }
            .game-banner .banner-left, .game-banner .banner-right { justify-content: center; }
        }

        /* LOBBY */
        .lobby-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            z-index: 10000; display: none; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; color: white; padding: 20px;
        }

        /* START SCREEN */
        .start-screen { text-align: center; padding: 40px 20px; }
        .start-screen h2 { font-size: 2rem; margin-bottom: 15px; }

        /* ANIMATIONS */
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        @keyframes bannerVictoryPulse {
            0%, 100% { box-shadow: 0 4px 15px rgba(241,196,15,0.3); }
            50% { box-shadow: 0 8px 30px rgba(241,196,15,0.6); }
        }
        .banner-victory { animation: bannerVictoryPulse 1s ease-in-out infinite; }
        .anim-shake { animation: shake 0.3s ease; }
        .confetti { position: fixed; width: 10px; height: 10px; z-index: 10001; pointer-events: none; }

        @media (max-width: 600px) {
            .cell { font-size: 0.7rem; }
            .coord-label { font-size: 0.55rem; }
            .ship-name { min-width: 80px; font-size: 0.75rem; }
            .ship-block { width: 16px; height: 16px; }
        }

        #fixed-home-btn {
            position: fixed; bottom: 20px; right: 20px; z-index: 9998; display: none;
        }
        #fixed-home-btn button {
            background: var(--panel); color: var(--text); border: 2px solid #555;
            padding: 12px 20px; border-radius: 50px; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .hidden { display: none !important; }
/* ==========================================
   🎯 FLOATING ATTACK LABEL
   ========================================== */
.attack-info-float {
    position: fixed;
    top: 15px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: rgba(0,0,0,0.88);
    color: white;
    padding: 12px 28px;
    border-radius: 30px;
    font-weight: 900;
    font-size: 1.05rem;
    z-index: 7800;
    text-align: center;
    border: 2px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 25px rgba(0,0,0,0.5);
    white-space: nowrap;
    pointer-events: none;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
    opacity: 0;
}
.attack-info-float.visible {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
}
.attack-info-float .atk-coord {
    color: #f1c40f;
    font-size: 1.3rem;
    margin-left: 8px;
    letter-spacing: 2px;
}
.attack-info-float .atk-arrow {
    color: #e74c3c;
    margin: 0 6px;
    font-size: 1.2rem;
}

/* Griglia evidenziata durante animazione */
.grid-highlight {
    box-shadow: 0 0 20px rgba(241,196,15,0.4), 0 0 40px rgba(241,196,15,0.2);
    transition: box-shadow 0.3s ease;
}
/* 🚀 MISSILE */
.missile {
    position: fixed;
    z-index: 7500;
    pointer-events: none;
    font-size: 2.5rem;
    filter: drop-shadow(0 0 12px rgba(231,76,60,0.9));
}
.missile-trail {
    position: fixed;
    width: 4px;
    border-radius: 2px;
    z-index: 7499;
    pointer-events: none;
    opacity: 0.8;
}

/* 💥 IMPACT FLASH */
.impact-flash {
    position: fixed;
    border-radius: 50%;
    z-index: 7600;
    pointer-events: none;
}

/* 🔥 IMPACT TEXT */
.impact-text {
    position: fixed;
    z-index: 7700;
    pointer-events: none;
    font-size: 3rem;
    font-weight: 900;
    text-shadow: 0 0 20px rgba(0,0,0,0.8);
    color: white;
}

/* Impact particles */
.impact-particle {
    position: fixed;
    border-radius: 50%;
    z-index: 7550;
    pointer-events: none;
}

/* Screen shake */
@keyframes screenShake {
    0%, 100% { transform: translate(0,0) rotate(0); }
    10% { transform: translate(-5px,-3px) rotate(-0.5deg); }
    20% { transform: translate(5px,2px) rotate(0.5deg); }
    30% { transform: translate(-3px,5px) rotate(-0.3deg); }
    40% { transform: translate(3px,-2px) rotate(0.3deg); }
    50% { transform: translate(-2px,3px) rotate(-0.2deg); }
    60% { transform: translate(4px,-3px) rotate(0.2deg); }
    70% { transform: translate(-3px,2px) rotate(-0.1deg); }
    80% { transform: translate(2px,-1px) rotate(0.1deg); }
    90% { transform: translate(-1px,2px) rotate(0); }
}
.screen-shake { animation: screenShake 0.5s ease; }
.screen-shake-heavy { animation: screenShake 0.7s ease 2; }

/* Ripple per splash */
.water-ripple {
    position: fixed;
    border: 3px solid rgba(100,180,255,0.6);
    border-radius: 50%;
    z-index: 7550;
    pointer-events: none;
}
/* ==========================================
   ⚔️ SELETTORE ARMI
   ========================================== */
.weapon-bar {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-bottom: 10px;
    padding: 8px;
    background: var(--ocean-deep);
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
}
.weapon-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 6px 10px;
    border-radius: 6px;
    border: 2px solid transparent;
    background: var(--panel-light);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    min-width: 60px;
    font-size: 0.7rem;
}
.weapon-btn:hover:not(:disabled) { border-color: var(--accent); }
.weapon-btn.active { border-color: var(--target-color); background: rgba(241,196,15,0.15); box-shadow: 0 0 10px rgba(241,196,15,0.2); }
.weapon-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.weapon-btn .w-emoji { font-size: 1.4rem; }
.weapon-btn .w-count { font-size: 0.65rem; color: var(--target-color); font-weight: 900; }
.weapon-btn .w-name { font-size: 0.6rem; margin-top: 2px; }

/* ==========================================
   🛡️ PANNELLO SCUDI
   ========================================== */
.shield-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    padding: 8px;
    background: rgba(46,204,113,0.08);
    border-radius: 8px;

}
.shield-btn {

}
.shield-btn:hover:not(:disabled) { background: rgba(46,204,113,0.15); }

.shield-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: #555; color: #555; }
.shield-label { font-size: 0.7rem; color: var(--text-dim); }

/* ==========================================
   📦 CASSA / 🔭 INTEL / 🛡️ SCUDO su griglia
   ========================================== */
.cell.cassa-cell {

}
.cell.cassa-cell::after { content: '📦'; font-size: 1.2em; z-index: 1; position: relative; }

const COL_LABELS = 'ABCDEFGHIJKLMNOP';
// ==========================================

const ARSENALE_INIZIALE = {

// Navi speciali: rimpiazzano le normali quando abilitate
const NAVI_SPECIALI = {

        ]
    },

        special: 'cannoniera'
    }
};

const EVENTI_CONFIG = {
    tempesta:         { emoji: '🌀', name: 'TEMPESTA!',         desc: 'Tutti i missili deviano di 1 cella!',         color: '#2980b9' },
    cassa:            { emoji: '📦', name: 'RIFORNIMENTO!',     desc: 'Una cassa è apparsa sulla mappa!',            color: '#f39c12' },
    kraken_selvaggio: { emoji: '🐙', name: 'KRAKEN SELVAGGIO!', desc: '3 celle random colpite!',                     color: '#8e44ad' }
};

// Feature flags (impostate dal listener Firebase)
let featureArmiSpeciali = false;
let featureNaviSpeciali = false;
let featureEventiRandom = false;
let featurePowerups = false;
// ==========================================
// STATO
// ==========================================
let gridSize = 10;
let naviConfig = [];
let naviPiazzate = [];       // [{configIdx, name, size, cells:[{r,c}], dir}]
let naveSelezionataIdx = -1;
let direzione = 'H';
let targetSelezionato = null;
let cellaSelezionata = null;  // {r, c} or null
let hoAttaccato = false;
let roundResultsShown = -1;
let currentBannerPriority = 0;
let currentGameData = null;
let unsubscribePartita = null;
let processingResolution = false;
let currentPreviewCells = [];  // DOM elements con preview
let animatingRound = -1;
let isAnimating = false;    
let selectedWeapon = 'missile';
let arsenaleLocale = { ...ARSENALE_INIZIALE };
let scudoGlobaleAttivo = false;
let scudoCellaAttiva = null;    // {r,c} o null
let krakenShapeIndex = 0;       // indice forma corrente per Kraken
    // ==========================================
// DOM
// ==========================================
const lobbyOverlay = document.getElementById('lobby-overlay');
const startScreen = document.getElementById('start-screen');
const mySection = document.getElementById('my-section');
const rightSection = document.getElementById('right-section');
const placementPanel = document.getElementById('placement-panel');
const battlePanel = document.getElementById('battle-panel');
const statusFase = document.getElementById('status-fase');
const statusTurno = document.getElementById('status-turno');
const statusSuperstiti = document.getElementById('status-superstiti');
const shipListEl = document.getElementById('ship-list');
const btnPronto = document.getElementById('btn-pronto');
const btnFire = document.getElementById('btn-fire');
const waitingBar = document.getElementById('waiting-bar');
const waitingText = document.getElementById('waiting-text');

function buildNaviConfig(size) {
    const base = [...(NAVI_CONFIGS[size] || NAVI_CONFIGS[10])];
    if (!featureNaviSpeciali) return base;

    const result = [];
    let krakenAdded = false;
    let cannonieraAdded = false;

    base.forEach(nave => {
        if (nave.size === 4 && !krakenAdded) {
            // Rimpiazza la prima nave da 4 con Kraken
            result.push({ ...NAVI_SPECIALI.kraken });
            krakenAdded = true;
        } else if (nave.size === 2 && !cannonieraAdded) {
            // Rimpiazza la prima nave da 2 con Cannoniera
            result.push({ ...NAVI_SPECIALI.cannoniera });
            cannonieraAdded = true;
        } else {
            result.push(nave);
        }
    });
    return result;
}
    
// ==========================================
// BANNER
// ==========================================
function showGameBanner(opts) {
    const priority = opts.priority || 1;
    if (currentBannerPriority > priority) return;
    currentBannerPriority = priority;
    let b = document.getElementById('game-banner');
    if (!b) { b = document.createElement('div'); b.id = 'game-banner'; b.className = 'game-banner'; document.body.appendChild(b); }
    b.style.background = `linear-gradient(135deg, ${opts.color} 0%, ${adjustColor(opts.color,-20)} 100%)`;
    if (opts.vibrate) b.classList.add('banner-victory'); else b.classList.remove('banner-victory');
    const btns = (opts.buttons||[]).map(x =>
        `<button onclick="${x.onclick}" class="btn" style="padding:8px 16px;background:white;color:#333;border:none;font-weight:700;">${x.text}</button>`
    ).join('');
    const spin = opts.spinner ? `<div style="width:18px;height:18px;border:3px solid white;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;"></div>` : '';
    b.innerHTML = `<div class="banner-left"><span style="font-size:1.5rem;">${opts.icon}</span><div><div style="font-weight:bold;">${opts.title}</div><div style="font-size:0.8rem;opacity:0.9;">${opts.subtitle||''}</div></div></div><div class="banner-right">${btns}${spin}</div>`;
}
function removeGameBanner() { currentBannerPriority = 0; const e = document.getElementById('game-banner'); if (e) e.remove(); }
function adjustColor(hex, amt) {
    let c = hex.replace('#',''); if (c.length===3) c=c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
    const n=parseInt(c,16);
    const r=Math.max(0,Math.min(255,(n>>16)+amt));
    const g=Math.max(0,Math.min(255,((n>>8)&0xFF)+amt));
    const b=Math.max(0,Math.min(255,(n&0xFF)+amt));
    return '#'+(0x1000000+r*0x10000+g*0x100+b).toString(16).slice(1);
}

// ==========================================
// UTILITY — ✅ TUTTE usano {r, c} objects
// ==========================================
function getAttacksAgainst(player, storico) { return (storico||[]).filter(a => a.target === player); }

function cellHasShip(player, r, c, naviData) {
    const navi = naviData[player];
    if (!navi) return false;
    return navi.some(nave => nave.cells.some(cell => cell.r === r && cell.c === c));
}
function getShipAt(player, r, c, naviData) {
    const navi = naviData[player];
    if (!navi) return null;
    return navi.find(nave => nave.cells.some(cell => cell.r === r && cell.c === c));
}
function wasAttacked(player, r, c, storico) {
    return (storico||[]).some(a => a.target === player && a.r === r && a.c === c);
}
function isShipSunk(player, nave, storico) {
    const attacks = getAttacksAgainst(player, storico);
    return nave.cells.every(cell => attacks.some(a => a.r === cell.r && a.c === cell.c));
}
function isPlayerEliminated(player, naviData, storico) {
    const navi = naviData[player];
    if (!navi || navi.length === 0) return false;
    return navi.every(nave => isShipSunk(player, nave, storico));
}
function getSurvivingPlayers(data) { return data.partecipanti.filter(p => !(data.eliminati||[]).includes(p)); }
function getOpponents(data) { return data.partecipanti.filter(p => p !== mioNome); }
function getSurvivingOpponents(data) { return getSurvivingPlayers(data).filter(p => p !== mioNome); }

// Determina info visiva per una cella nave
function getShipCellInfo(navi, r, c) {
    for (const nave of navi) {
        const idx = nave.cells.findIndex(cell => cell.r === r && cell.c === c);
        if (idx === -1) continue;
        if (nave.cells.length === 1) return { ship: nave, pos: 'single', dir: 'H', idx };
        const dir = nave.cells[0].r === nave.cells[1].r ? 'H' : 'V';
        let pos = 'mid';
        if (idx === 0) pos = 'bow';
        else if (idx === nave.cells.length - 1) pos = 'stern';
        return { ship: nave, pos, dir, idx };
    }
    return null;
}

// ==========================================
// RENDER GRIGLIA — con onde e navi visive
// ==========================================
function renderGrid(containerId, opts) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'battle-grid';
    grid.style.gridTemplateColumns = `25px repeat(${opts.size}, 1fr)`;
    grid.style.gridTemplateRows = `25px repeat(${opts.size}, 1fr)`;

    // Corner
    grid.appendChild(Object.assign(document.createElement('div'), { className: 'coord-label' }));
    // Column headers
    for (let c = 0; c < opts.size; c++) {
        const lbl = document.createElement('div');
        lbl.className = 'coord-label';
        lbl.textContent = COL_LABELS[c];
        grid.appendChild(lbl);
    }

    // Precalcola set
    const allAttacks = opts.allAttacks || opts.attacks || [];
    const attackedSet = new Set();
    allAttacks.forEach(a => attackedSet.add(`${a.r},${a.c}`));

    const shipCellSet = new Set();
    const sunkCellSet = new Set();
    const shipsForInfo = opts.showShips || [];

    shipsForInfo.forEach(nave => {
        const sunk = nave.cells.every(cell => attackedSet.has(`${cell.r},${cell.c}`));
        nave.cells.forEach(cell => {
            shipCellSet.add(`${cell.r},${cell.c}`);
            if (sunk) sunkCellSet.add(`${cell.r},${cell.c}`);
        });
    });

    // Celle affondate rivelate (griglia avversario)
    const revealedSunkCells = new Set();
    const revealedSunkShips = [];
    if (!opts.isMyGrid && opts.enemyShips) {
        opts.enemyShips.forEach(nave => {
            const sunk = nave.cells.every(cell => allAttacks.some(a => a.r === cell.r && a.c === cell.c));
            if (sunk) {
                revealedSunkShips.push(nave);
                nave.cells.forEach(cell => revealedSunkCells.add(`${cell.r},${cell.c}`));
            }
        });
    }

    for (let r = 0; r < opts.size; r++) {
        // Row label
        const rlbl = document.createElement('div');
        rlbl.className = 'coord-label';
        rlbl.textContent = r + 1;
        grid.appendChild(rlbl);

        for (let c = 0; c < opts.size; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.row = r;
            cell.dataset.col = c;
            const key = `${r},${c}`;
            const attacked = attackedSet.has(key);
            const hasShip = shipCellSet.has(key);
            const isSunk = sunkCellSet.has(key);
            const isRevealedSunk = revealedSunkCells.has(key);

            // 🌊 Wave delay basato su posizione
            const waveDelay = (r * 0.12 + c * 0.18) % 3;
            const waveSpeed = 4 + (r + c) % 3;
            cell.style.setProperty('--wave-delay', `${waveDelay}s`);
            cell.style.setProperty('--wave-speed', `${waveSpeed}s`);

            if (opts.isMyGrid) {
                if (hasShip) {
                    cell.classList.add('ship-cell');
                    // Aggiungi forma nave
                    const info = getShipCellInfo(shipsForInfo, r, c);
                    if (info) {
                        if (info.pos === 'single') cell.classList.add('ship-single');
                        else cell.classList.add(`ship-${info.pos}-${info.dir.toLowerCase()}`);
                        // Emoji sulla prua
                        if (info.pos === 'bow' || info.pos === 'single') {
                            const em = document.createElement('span');
                            em.className = 'ship-emoji';
                            em.textContent = info.ship.emoji || '🚢';
                            cell.appendChild(em);
                        }
                    }
                    if (isSunk) {
                        cell.classList.add('sunk-cell');
                    } else if (attacked) {
                        cell.classList.add('ship-hit');
                        const fire = document.createElement('span');
                        fire.className = 'hit-fire';
                        fire.textContent = '🔥';
                        cell.appendChild(fire);
                    } else {
                        // Nave intatta: mostra emoji prua
                    }
                } else if (attacked) {
                    cell.classList.add('miss-marker');
                }
                cell.classList.add('no-hover');
            } else {
                // Griglia avversario
                if (isRevealedSunk) {
                    cell.classList.add('ship-cell', 'sunk-cell');
                    const info = getShipCellInfo(revealedSunkShips, r, c);
                    if (info) {
                        if (info.pos === 'single') cell.classList.add('ship-single');
                        else cell.classList.add(`ship-${info.pos}-${info.dir.toLowerCase()}`);
                    }
                } else if (attacked) {
                    const hitShip = opts.enemyShips && opts.enemyShips.some(n => n.cells.some(cc => cc.r === r && cc.c === c));
                    cell.classList.add(hitShip ? 'hit-marker' : 'miss-marker');
                    cell.classList.add('attacked-cell', 'no-hover');
                }
            }

            // Bersaglio selezionato
            if (opts.targetCell && opts.targetCell.r === r && opts.targetCell.c === c) {
                cell.classList.add('target-cell');
            }
            // Scudo su cella
            if (opts.shieldedCell && opts.shieldedCell.r === r && opts.shieldedCell.c === c) {
                cell.classList.add('shielded-cell');
            }

            // Intel (celle rivelate)
            if (opts.intelCells) {
                const isIntel = opts.intelCells.some(ic => ic.r === r && ic.c === c);
                if (isIntel && !attacked) cell.classList.add('intel-cell');
            }
            // Click handler
            if (opts.interactive && !attacked && !isRevealedSunk) {
                cell.addEventListener('click', () => opts.onClick(r, c));
            } else if (!opts.interactive) {
                cell.classList.add('no-hover');
            }

            // Hover preview per piazzamento
            if (opts.isMyGrid && opts.placementMode && naveSelezionataIdx >= 0) {
                cell.addEventListener('mouseenter', () => showPlacementPreview(r, c));
                cell.addEventListener('mouseleave', clearPlacementPreview);
                cell.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    showPlacementPreview(r, c);
                }, { passive: false });
            }

            grid.appendChild(cell);
        }
    }
    container.appendChild(grid);
}

// ==========================================
// PREVIEW PIAZZAMENTO
// ==========================================
function showPlacementPreview(r, c) {
    clearPlacementPreview();
    if (naveSelezionataIdx < 0) return;
    const config = naviConfig[naveSelezionataIdx];
    if (naviPiazzate.some(p => p.configIdx === naveSelezionataIdx)) return;

    let cells;
    if (config.special === 'kraken') {
        cells = calcolaCelleKraken(r, c, krakenShapeIndex);
    } else {
        cells = calcolaCelleNave(r, c, config.size, direzione);
    }
    const valid = cells !== null && !haOverlap(cells);
    const cellsToShow = cells || (config.special === 'kraken'
        ? calcolaCelleKrakenClipped(r, c, krakenShapeIndex)
        : calcolaCelleNaveClipped(r, c, config.size, direzione));

    const gridEl = document.querySelector('#my-grid-container .battle-grid');
    if (!gridEl) return;

    cellsToShow.forEach(pos => {
        const domCell = gridEl.querySelector(`.cell[data-row="${pos.r}"][data-col="${pos.c}"]`);
        if (domCell && !domCell.classList.contains('ship-cell')) {
            domCell.classList.add(valid ? 'preview-valid' : 'preview-invalid');
            currentPreviewCells.push(domCell);
        }
    });
}

function clearPlacementPreview() {
    currentPreviewCells.forEach(el => el.classList.remove('preview-valid', 'preview-invalid'));
    currentPreviewCells = [];
}

// ==========================================
// PIAZZAMENTO NAVI — ✅ cells come {r, c}
// ==========================================
function calcolaCelleNave(startR, startC, size, dir) {
    const cells = [];
    for (let i = 0; i < size; i++) {
        const r = dir === 'V' ? startR + i : startR;
        const c = dir === 'H' ? startC + i : startC;
        if (r >= gridSize || c >= gridSize) return null;
        cells.push({ r, c });
    }
    return cells;
}

// Versione che ritorna celle anche se fuori griglia (per preview rosso)
function calcolaCelleNaveClipped(startR, startC, size, dir) {
    const cells = [];
    for (let i = 0; i < size; i++) {
        const r = dir === 'V' ? startR + i : startR;
        const c = dir === 'H' ? startC + i : startC;
        if (r < gridSize && c < gridSize) cells.push({ r, c });
    }
    return cells;
}

function haOverlap(cells) {
    const occupate = new Set();
    naviPiazzate.forEach(n => n.cells.forEach(c => occupate.add(`${c.r},${c.c}`)));
    return cells.some(c => occupate.has(`${c.r},${c.c}`));
}

function iniziaPiazzamento() {
    naviPiazzate = [];
    naveSelezionataIdx = 0;
    direzione = 'H';
    startScreen.style.display = 'none';
    mySection.classList.remove('hidden');
    rightSection.classList.remove('hidden');
    placementPanel.classList.remove('hidden');
    battlePanel.classList.add('hidden');
    document.getElementById('my-section-title').textContent = 'PIAZZA LE TUE NAVI';
    statusFase.textContent = 'Piazzamento';
    renderShipList();
    renderMiaGrigliaPiazzamento();
    aggiornaBottonePronto();
}

function renderShipList() {
    shipListEl.innerHTML = '';
    naviConfig.forEach((nave, idx) => {
        const placed = naviPiazzate.some(p => p.configIdx === idx);
        const item = document.createElement('div');
        item.className = `ship-item ${naveSelezionataIdx === idx ? 'selected' : ''} ${placed ? 'placed' : ''}`;
        item.innerHTML = `
            <span class="ship-name">${nave.emoji} ${nave.name}</span>
            <div class="ship-blocks">${'<span class="ship-block"></span>'.repeat(nave.size)}</div>
            <span class="ship-size-label">${nave.size} celle</span>
        `;
        if (!placed) {
            item.addEventListener('click', () => { naveSelezionataIdx = idx; renderShipList(); renderMiaGrigliaPiazzamento(); });
        } else {
            item.addEventListener('click', () => rimuoviNavePiazzata(idx));
            item.title = 'Clicca per rimuovere';
        }
        shipListEl.appendChild(item);
    });
}

function ruotaDirezione() {
    if (naveSelezionataIdx >= 0 && naviConfig[naveSelezionataIdx].special === 'kraken') {
        krakenShapeIndex = (krakenShapeIndex + 1) % NAVI_SPECIALI.kraken.shapes.length;
        const tipo = krakenShapeIndex < 4 ? 'L' : 'T';
        const rot = (krakenShapeIndex % 4) + 1;
        document.getElementById('direction-label').innerHTML = `Forma: <b>${tipo} (rotazione ${rot})</b>`;
    } else {
        direzione = direzione === 'H' ? 'V' : 'H';
        document.getElementById('direction-label').innerHTML = `Direzione: <b>${direzione === 'H' ? 'Orizzontale →' : 'Verticale ↓'}</b>`;
    }
    renderMiaGrigliaPiazzamento();
}

function calcolaCelleKraken(startR, startC, shapeIdx) {
    const shapes = NAVI_SPECIALI.kraken.shapes;
    const shape = shapes[shapeIdx % shapes.length];
    const cells = shape.map(offset => ({ r: startR + offset.r, c: startC + offset.c }));
    if (cells.some(c => c.r >= gridSize || c.c >= gridSize || c.r < 0 || c.c < 0)) return null;
    return cells;
}

function calcolaCelleKrakenClipped(startR, startC, shapeIdx) {
    const shapes = NAVI_SPECIALI.kraken.shapes;
    const shape = shapes[shapeIdx % shapes.length];
    return shape.map(o => ({ r: startR + o.r, c: startC + o.c }))
        .filter(c => c.r >= 0 && c.r < gridSize && c.c >= 0 && c.c < gridSize);
}
    
function piazzaNave(r, c) {
    if (naveSelezionataIdx < 0) return;
    const config = naviConfig[naveSelezionataIdx];
    if (naviPiazzate.some(p => p.configIdx === naveSelezionataIdx)) return;

    let cells;
    if (config.special === 'kraken') {
        cells = calcolaCelleKraken(r, c, krakenShapeIndex);
    } else {
        cells = calcolaCelleNave(r, c, config.size, direzione);
    }
    if (!cells || haOverlap(cells)) {
        const ct = document.getElementById('my-grid-container');
        ct.classList.add('anim-shake');
        setTimeout(() => ct.classList.remove('anim-shake'), 300);
        return;
    }
    naviPiazzate.push({ configIdx: naveSelezionataIdx, name: config.name, size: config.size, emoji: config.emoji, special: config.special || null, cells, dir: config.special === 'kraken' ? 'K' : direzione });
    // Auto-select next
    naveSelezionataIdx = -1;
    for (let i = 0; i < naviConfig.length; i++) {
        if (!naviPiazzate.some(p => p.configIdx === i)) { naveSelezionataIdx = i; break; }
    }
    clearPlacementPreview();
    renderShipList();
    renderMiaGrigliaPiazzamento();
    aggiornaBottonePronto();
}

function rimuoviNavePiazzata(configIdx) {
    naviPiazzate = naviPiazzate.filter(p => p.configIdx !== configIdx);
    naveSelezionataIdx = configIdx;
    renderShipList();
    renderMiaGrigliaPiazzamento();
    aggiornaBottonePronto();
}

function resetPiazzamento() {
    naviPiazzate = [];
    naveSelezionataIdx = 0;
    renderShipList();
    renderMiaGrigliaPiazzamento();
    aggiornaBottonePronto();
}

function aggiornaBottonePronto() {
    btnPronto.disabled = naviPiazzate.length < naviConfig.length;
}

function renderMiaGrigliaPiazzamento() {
    const shipData = naviPiazzate.map(n => ({ cells: n.cells, emoji: n.emoji, name: n.name, size: n.size }));
    renderGrid('my-grid-container', {
        size: gridSize,
        showShips: shipData,
        attacks: [],
        isMyGrid: true,
        interactive: true,
        placementMode: true,
        onClick: piazzaNave
    });
}

// ✅ FIX: Converte celle in oggetti semplici per Firebase
async function confermaPiazzamento() {
    if (naviPiazzate.length < naviConfig.length) return;
    btnPronto.disabled = true;

// ==========================================
// BATTAGLIA
// ==========================================
function iniziaBattaglia(data) {
    startScreen.style.display = 'none';
    mySection.classList.remove('hidden');
    rightSection.classList.remove('hidden');
    placementPanel.classList.add('hidden');
    battlePanel.classList.remove('hidden');
    document.getElementById('my-section-title').textContent = 'LA TUA FLOTTA';
    statusFase.textContent = (data.eliminati||[]).includes(mioNome) ? 'Eliminato 💀' : 'Battaglia';
    hoAttaccato = false;
    cellaSelezionata = null;
    renderBattaglia(data);
}

function renderBattaglia(data) {
    const storico = data.storicoAttacchi || [];
    const attacchiTurno = data.attacchiTurno || {};
    const eliminati = data.eliminati || [];
    const turno = data.turnoCorrente || 1;
    const amIEliminated = eliminati.includes(mioNome);

    statusTurno.textContent = turno;
    const surviving = getSurvivingPlayers(data);
    statusSuperstiti.textContent = `${surviving.length}/${data.partecipanti.length}`;

    hoAttaccato = !!attacchiTurno[mioNome] || amIEliminated;

    // Mia griglia
    const mieNavi = data.navi[mioNome] || [];
    const attacchiControMe = getAttacksAgainst(mioNome, storico);
    renderGrid('my-grid-container', {
        size: gridSize, showShips: mieNavi,
        allAttacks: attacchiControMe, attacks: attacchiControMe,
        isMyGrid: true, interactive: false
    });
    renderFleetStatus('my-fleet-status', mieNavi, storico, mioNome);

    // Tabs avversari
    renderOpponentTabs(data, eliminati);

    if (!targetSelezionato || !data.partecipanti.includes(targetSelezionato) || targetSelezionato === mioNome) {
        const opp = getSurvivingOpponents(data);
        targetSelezionato = opp.length > 0 ? opp[0] : getOpponents(data)[0];
    }
    renderOpponentGrid(data);

    // Render weapon bar e shield bar
    renderWeaponBar();
    renderShieldBar();

    // Aggiorna testo bottone
    if (selectedWeapon === 'laser') {
        btnFire.textContent = '🔭 SCANSIONA!';
    } else if (selectedWeapon === 'cluster') {
        btnFire.textContent = '💣 FUOCO GRAPPOLO!';
    } else {
        btnFire.textContent = '🔥 FUOCO!';
    }

    if (hoAttaccato) {
        btnFire.classList.add('hidden');
        waitingBar.classList.remove('hidden');
        const submitted = Object.keys(attacchiTurno).length;
        waitingText.textContent = `Attacchi: ${submitted}/${surviving.length} — attendo gli altri...`;
    } else if (amIEliminated) {
        btnFire.classList.add('hidden');
        waitingBar.classList.remove('hidden');
        waitingText.textContent = '💀 Sei stato eliminato. Osserva la battaglia!';
    } else {
        btnFire.classList.remove('hidden');
        btnFire.disabled = !cellaSelezionata;
        waitingBar.classList.add('hidden');
    }
}

function renderOpponentTabs(data, eliminati) {
    const tabsEl = document.getElementById('opponent-tabs');
    tabsEl.innerHTML = '';
    getOpponents(data).forEach(p => {
        const btn = document.createElement('button');
        btn.className = `tab-btn ${p === targetSelezionato ? 'active' : ''} ${eliminati.includes(p) ? 'eliminated' : ''}`;
        btn.textContent = `${eliminati.includes(p) ? '💀 ' : ''}${p}`;
        btn.addEventListener('click', () => {
        targetSelezionato = p;
        cellaSelezionata = null;
        renderOpponentTabs(currentGameData, currentGameData.eliminati || []);
        renderOpponentGrid(currentGameData);
        btnFire.disabled = true;
    });
        tabsEl.appendChild(btn);
    });
}

function renderOpponentGrid(data) {
    if (!targetSelezionato) return;
    const storico = data.storicoAttacchi || [];
    const eliminati = data.eliminati || [];
    const targetEliminated = eliminati.includes(targetSelezionato);
    const amIEliminated = eliminati.includes(mioNome);
    const allAttacksVsTarget = getAttacksAgainst(targetSelezionato, storico);
    const targetShips = data.navi[targetSelezionato] || [];
    const interactive = !hoAttaccato && !amIEliminated && !targetEliminated;

    // Raccogli dati intel per questo avversario
    const myIntel = currentGameData?.intelData?.[mioNome]?.[targetSelezionato] || [];
    const intelCellsForTarget = myIntel.filter(i => i.hasShip);

    renderGrid('opponent-grid-container', {
        size: gridSize,
        showShips: targetEliminated ? targetShips : [],
        enemyShips: targetShips,
        allAttacks: allAttacksVsTarget,
        isMyGrid: false,
        interactive,
        onClick: (r, c) => selezionaCellaAttacco(r, c, data),
        targetCell: cellaSelezionata,
        intelCells: intelCellsForTarget
    });
    renderFleetStatus('opponent-fleet-status', targetShips, storico, targetSelezionato);

    // Preview celle arma quando hover sulla griglia (solo se non laser — laser mostra preview sul click)
    if (interactive && (selectedWeapon === 'cluster' || selectedWeapon === 'laser')) {
        const gridEl = document.querySelector('#opponent-grid-container .battle-grid');
        if (gridEl) {
            gridEl.querySelectorAll('.cell').forEach(cellEl => {
                if (cellEl.classList.contains('attacked-cell')) return;
                cellEl.addEventListener('mouseenter', () => {
                    const cr = parseInt(cellEl.dataset.row);
                    const cc = parseInt(cellEl.dataset.col);
                    const previewCells = calcolaCelleArma(selectedWeapon, cr, cc);
                    const previewClass = selectedWeapon === 'cluster' ? 'preview-cluster' : 'preview-laser';
                    previewCells.forEach(pc => {
                        const target = gridEl.querySelector(`.cell[data-row="${pc.r}"][data-col="${pc.c}"]`);
                        if (target && !target.classList.contains('attacked-cell')) {
                            target.classList.add(previewClass);
                        }
                    });
                });
                cellEl.addEventListener('mouseleave', () => {
                    gridEl.querySelectorAll('.preview-cluster, .preview-laser').forEach(el => {
                        el.classList.remove('preview-cluster', 'preview-laser');
                    });
                });
            });
        }
    }

    // Mostra casse sulla griglia avversario
    const casseAttive = currentGameData?.casseAttive || [];
    if (casseAttive.length > 0) {
        const gridEl = document.querySelector('#opponent-grid-container .battle-grid');
        if (gridEl) {
            casseAttive.forEach(cassa => {
                const cellEl = gridEl.querySelector(`.cell[data-row="${cassa.r}"][data-col="${cassa.c}"]`);
                if (cellEl && !cellEl.classList.contains('attacked-cell')) {
                    cellEl.classList.add('cassa-cell');
                }
            });
        }
    }
}

function renderFleetStatus(containerId, navi, storico, player) {
    const el = document.getElementById(containerId);
    el.innerHTML = '';
    navi.forEach(nave => {
        const sunk = isShipSunk(player, nave, storico);
        const span = document.createElement('span');
        span.className = `fleet-ship-indicator ${sunk ? 'sunk' : ''}`;
        span.textContent = `${nave.emoji||''} ${nave.name} (${nave.size})`;
        el.appendChild(span);
    });
}

function selezionaCellaAttacco(r, c, data) {
    if (hoAttaccato || isAnimating) return;
    if (wasAttacked(targetSelezionato, r, c, data.storicoAttacchi || [])) return;
    cellaSelezionata = { r, c };
    // ✅ Solo la griglia avversaria, NON la mia
    renderOpponentGrid(data);
    btnFire.disabled = false;
}

async function confermaAttacco() {
    if (!cellaSelezionata || !targetSelezionato || hoAttaccato || isAnimating) return;
    if ((currentGameData.eliminati||[]).includes(mioNome)) return;
    if ((currentGameData.eliminati||[]).includes(targetSelezionato)) { alert("Non puoi attaccare un giocatore eliminato!"); return; }

    // Verifica disponibilità arma
    if (!ARMI_CONFIG[selectedWeapon]?.unlimited) {
        if ((arsenaleLocale[selectedWeapon] || 0) <= 0) {
            alert(`${ARMI_CONFIG[selectedWeapon].name} esaurito!`);
            return;
        }
    }

    // Verifica laser non colpisce celle già scansionate
    if (selectedWeapon === 'laser') {
        btnFire.textContent = '🔭 SCANSIONE...';
    }

    btnFire.disabled = true;

    const attackData = {
        target: targetSelezionato,
        r: cellaSelezionata.r,
        c: cellaSelezionata.c,
        weapon: selectedWeapon
    };

    // Scudi
    if (scudoGlobaleAttivo) attackData.scudoGlobale = true;
    if (scudoCellaAttiva) attackData.scudoCella = { r: scudoCellaAttiva.r, c: scudoCellaAttiva.c };

    try {
        const updates = {
            [`attacchiTurno.${mioNome}`]: attackData
        };

        // Decrementa arsenale locale
        if (!ARMI_CONFIG[selectedWeapon]?.unlimited) {
            arsenaleLocale[selectedWeapon] = (arsenaleLocale[selectedWeapon] || 0) - 1;
            updates[`arsenale.${mioNome}`] = { ...arsenaleLocale };
        }
        if (scudoGlobaleAttivo) {
            arsenaleLocale.scudo = (arsenaleLocale.scudo || 0) - 1;
            updates[`arsenale.${mioNome}`] = { ...arsenaleLocale };
        }
        if (scudoCellaAttiva) {
            arsenaleLocale.scudoStratega = (arsenaleLocale.scudoStratega || 0) - 1;
            updates[`arsenale.${mioNome}`] = { ...arsenaleLocale };
        }

        await db.collection("partite").doc(matchId).update(updates);

        hoAttaccato = true;
        cellaSelezionata = null;
        scudoGlobaleAttivo = false;
        scudoCellaAttiva = null;
        selectedWeapon = 'missile';
        shieldSelectionMode = false;
    } catch (e) {
        console.error("Errore invio attacco:", e);
        btnFire.disabled = false;
        btnFire.textContent = '🔥 FUOCO!';
        alert("Errore. Riprova.");
    }
}

// ==========================================
// RISOLUZIONE TURNO
// ==========================================
async function risolviTurno(data) {
    if (processingResolution) return;
    processingResolution = true;

    try {
        await db.runTransaction(async (transaction) => {
            const docRef = db.collection("partite").doc(matchId);
            const snap = await transaction.get(docRef);
            const fd = snap.data();
            const surviving = getSurvivingPlayers(fd);
            const attacks = fd.attacchiTurno || {};
            if (Object.keys(attacks).length < surviving.length) { processingResolution = false; return; }

            const turno = fd.turnoCorrente || 1;
            const storico = fd.storicoAttacchi || [];
            const mode = fd.opzioni?.mode || 'classic';
            const hasEvents = (mode === 'trump');
            const hasSpecial = (mode === 'super' || mode === 'trump');
            let casseAttive = [...(fd.casseAttive || [])];
            let arsenali = JSON.parse(JSON.stringify(fd.arsenale || {}));
            const eventiLog = [...(fd.eventiLog || [])];
            let intelData = JSON.parse(JSON.stringify(fd.intelData || {}));

            // =====================
            // A. EVENTI RANDOM
            // =====================
            let tempestaAttiva = false;
            let krakenSelvaggio = [];

            if (hasEvents && turno >= 3) {
                // Tempesta: 20% dal turno 3
                if (Math.random() < 0.20) {
                    tempestaAttiva = true;
                    eventiLog.push({ turno, tipo: 'tempesta' });
                }
            }
            if (hasEvents && turno >= 5) {
                // Kraken selvaggio: 15%
                if (Math.random() < 0.15) {
                    const ksHits = [];
                    for (let i = 0; i < 3; i++) {
                        const target = surviving[Math.floor(Math.random() * surviving.length)];
                        const kr = Math.floor(Math.random() * gridSize);
                        const kc = Math.floor(Math.random() * gridSize);
                        ksHits.push({ by: '🐙KRAKEN', target, r: kr, c: kc, round: turno, isEvent: true });
                    }
                    krakenSelvaggio = ksHits;
                    eventiLog.push({ turno, tipo: 'kraken_selvaggio', hits: ksHits.map(h => ({target:h.target, r:h.r, c:h.c})) });
                }
            }
            if (hasEvents && turno % 4 === 0) {
                // Cassa di rifornimento
                const cr = Math.floor(Math.random() * gridSize);
                const cc = Math.floor(Math.random() * gridSize);
                casseAttive.push({ r: cr, c: cc });
                eventiLog.push({ turno, tipo: 'cassa', r: cr, c: cc });
            }

            // =====================
            // B. RACCOGLI SCUDI
            // =====================
            const scudi = {};
            Object.entries(attacks).forEach(([player, atk]) => {
                scudi[player] = {
                    globale: atk.scudoGlobale || false,
                    globaleUsato: false,
                    cella: atk.scudoCella || null
                };
            });

            // =====================
            // C. ESPANDI ATTACCHI
            // =====================
            let allAttackCells = [];

            Object.entries(attacks).forEach(([player, atk]) => {
                let cells = calcolaCelleArma(atk.weapon || 'missile', atk.r, atk.c);

                // Tempesta: devia di 1 cella
                if (tempestaAttiva && atk.weapon !== 'laser') {
                    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
                    const d = dirs[Math.floor(Math.random() * dirs.length)];
                    cells = cells.map(c => ({
                        r: Math.max(0, Math.min(gridSize - 1, c.r + d[0])),
                        c: Math.max(0, Math.min(gridSize - 1, c.c + d[1]))
                    }));
                }

                cells.forEach(cell => {
                    allAttackCells.push({
                        by: player,
                        target: atk.target,
                        r: cell.r,
                        c: cell.c,
                        round: turno,
                        weapon: atk.weapon || 'missile',
                        isLaser: (atk.weapon === 'laser')
                    });
                });
            });

            // Aggiungi Kraken selvaggio
            allAttackCells.push(...krakenSelvaggio);

            // =====================
            // D. APPLICA SCUDI
            // =====================
            const finalAttacks = [];
            const laserReveals = [];

            allAttackCells.forEach(atk => {
                // Laser non fa danno, solo rivela
                if (atk.isLaser) {
                    laserReveals.push(atk);
                    return;
                }

                const targetPlayer = atk.target;
                const shield = scudi[targetPlayer];

                // Scudo Stratega: protegge cella specifica
                if (shield && shield.cella && shield.cella.r === atk.r && shield.cella.c === atk.c) {
                    // Colpo bloccato!
                    return;
                }
                // Scudo Globale: blocca il primo colpo
                if (shield && shield.globale && !shield.globaleUsato) {
                    shield.globaleUsato = true;
                    return;
                }

                // Non duplicare attacchi sulla stessa cella già colpita
                const alreadyHit = storico.some(s => s.target === atk.target && s.r === atk.r && s.c === atk.c);
                if (!alreadyHit) {
                    finalAttacks.push(atk);
                }
            });

            // Aggiungi laser reveals a intel
            laserReveals.forEach(lr => {
                if (!intelData[lr.by]) intelData[lr.by] = {};
                if (!intelData[lr.by][lr.target]) intelData[lr.by][lr.target] = [];
                const hasShip = cellHasShip(lr.target, lr.r, lr.c, fd.navi);
                intelData[lr.by][lr.target].push({ r: lr.r, c: lr.c, hasShip, turno });
            });

            const storicoAgg = [...storico, ...finalAttacks];

            // =====================
            // E. CASSA RIFORNIMENTO
            // =====================
            const nuoveCasse = [];
            casseAttive.forEach(cassa => {
                const hit = finalAttacks.some(a => a.r === cassa.r && a.c === cassa.c);
                if (hit) {
                    // Chi ha colpito la cassa?
                    const hitter = finalAttacks.find(a => a.r === cassa.r && a.c === cassa.c);
                    if (hitter && arsenali[hitter.by]) {
                        // Bonus random
                        const bonusType = ['cluster', 'laser', 'scudo'][Math.floor(Math.random() * 3)];
                        arsenali[hitter.by][bonusType] = (arsenali[hitter.by][bonusType] || 0) + 1;
                    }
                    // Cassa consumata
                } else {
                    nuoveCasse.push(cassa);
                }
            });

            // =====================
            // F. CANNONIERA RITORSIONE
            // =====================
            const ritorsioni = [];
            if (hasSpecial) {
                finalAttacks.forEach(atk => {
                    const targetNavi = fd.navi[atk.target] || [];
                    const hitShip = targetNavi.find(nave =>
                        nave.cells.some(c => c.r === atk.r && c.c === atk.c) && nave.special === 'cannoniera'
                    );
                    if (hitShip && !isShipSunk(atk.target, hitShip, storicoAgg)) {
                        // Ritorsione: spara a cella random dell'attaccante
                        const rr = Math.floor(Math.random() * gridSize);
                        const rc = Math.floor(Math.random() * gridSize);
                        const alreadyHit = storicoAgg.some(s => s.target === atk.by && s.r === rr && s.c === rc);
                        if (!alreadyHit) {
                            ritorsioni.push({
                                by: `${atk.target}💥`,
                                target: atk.by,
                                r: rr, c: rc,
                                round: turno,
                                isRetaliation: true
                            });
                        }
                    }
                });
            }
            const storicoFinale = [...storicoAgg, ...ritorsioni];

            // =====================
            // G. INTEL automatica (ogni 4 turni)
            // =====================
            if (hasSpecial && turno % 4 === 0) {
                surviving.forEach(player => {
                    if (!intelData[player]) intelData[player] = {};
                    const opponents = surviving.filter(p => p !== player);
                    opponents.forEach(opp => {
                        const naviOpp = fd.navi[opp] || [];
                        const allCells = naviOpp.flatMap(n => n.cells);
                        const unrevealedCells = allCells.filter(c =>
                            !storicoFinale.some(s => s.target === opp && s.r === c.r && s.c === c.c)
                        );
                        if (unrevealedCells.length > 0) {
                            const reveal = unrevealedCells[Math.floor(Math.random() * unrevealedCells.length)];
                            if (!intelData[player][opp]) intelData[player][opp] = [];
                            intelData[player][opp].push({ r: reveal.r, c: reveal.c, hasShip: true, turno });
                        }
                    });
                });
            }

            // =====================
            // H. ELIMINAZIONI
            // =====================
            const nuoviEliminati = [...(fd.eliminati || [])];
            fd.partecipanti.forEach(player => {
                if (nuoviEliminati.includes(player)) return;
                if (isPlayerEliminated(player, fd.navi, storicoFinale)) nuoviEliminati.push(player);
            });

            const sopravvissuti = fd.partecipanti.filter(p => !nuoviEliminati.includes(p));
            const vincitore = sopravvissuti.length <= 1 ? (sopravvissuti[0] || null) : null;

            // =====================
            // SAVE
            // =====================
            transaction.update(docRef, {
                storicoAttacchi: storicoFinale,
                attacchiTurno: {},
                turnoCorrente: turno + 1,
                eliminati: nuoviEliminati,
                vincitore,
                ultimoRoundRisolto: turno,
                stato: vincitore ? 'conclusa' : 'battaglia',
                casseAttive: nuoveCasse,
                arsenale: arsenali,
                eventiLog,
                intelData,
                tempestaAttivaTurno: tempestaAttiva ? turno : null,
                krakenSelvaggioTurno: krakenSelvaggio.length > 0 ? turno : null
            });
        });
    } catch (e) { console.error("Errore risoluzione:", e); }
    processingResolution = false;
}

// ==========================================
// 🚀 ANIMAZIONI ATTACCO SULLE GRIGLIE REALI
// ==========================================
async function playAttackAnimations(data, roundNumber) {
    if (animatingRound >= roundNumber) return;
    animatingRound = roundNumber;
    isAnimating = true;

    const storico = data.storicoAttacchi || [];
    const attacks = storico.filter(a => a.round === roundNumber);
    if (attacks.length === 0) { isAnimating = false; return; }

    // Ordina: mio attacco → attacchi su altri → attacchi su di me
    const myAttacks = attacks.filter(a => a.by === mioNome);
    const onOthers = attacks.filter(a => a.by !== mioNome && a.target !== mioNome);
    const onMe = attacks.filter(a => a.by !== mioNome && a.target === mioNome);
    const sorted = [...myAttacks, ...onOthers, ...onMe];

    for (const atk of sorted) {
        await animateSingleAttack(atk, data, storico);
        await sleep(400);
    }

    isAnimating = false;
    // Re-render per stato finale pulito
    renderBattaglia(data);
}

async function animateSingleAttack(atk, data, storico) {
    const isMyAttack = atk.by === mioNome;
    const targetsMe = atk.target === mioNome;

    let gridContainerId, startDir;

    if (isMyAttack) {
        // Mio attacco: missile dal basso → griglia avversario
        targetSelezionato = atk.target;
        renderOpponentTabs(data, data.eliminati || []);
        renderOpponentGrid(data);
        gridContainerId = 'opponent-grid-container';
        startDir = 'bottom';
    } else if (targetsMe) {
        // Nemico attacca me: missile da sinistra → mia griglia
        gridContainerId = 'my-grid-container';
        startDir = 'left';
    } else {
        // Nemico attacca un altro: missile da destra → griglia avversario (switch tab)
        targetSelezionato = atk.target;
        renderOpponentTabs(data, data.eliminati || []);
        renderOpponentGrid(data);
        gridContainerId = 'opponent-grid-container';
        startDir = 'right';
    }

    const gridContainer = document.getElementById(gridContainerId);
    if (!gridContainer) return;

    // Scroll alla griglia
    gridContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
    await sleep(300);

    // Evidenzia la griglia
    const gridEl = gridContainer.querySelector('.battle-grid');
    if (gridEl) gridEl.classList.add('grid-highlight');

    // Trova la cella bersaglio nel DOM
    const cellEl = gridContainer.querySelector(`.cell[data-row="${atk.r}"][data-col="${atk.c}"]`);
    if (!cellEl) { if (gridEl) gridEl.classList.remove('grid-highlight'); return; }

    const cellRect = cellEl.getBoundingClientRect();
    const targetX = cellRect.left + cellRect.width / 2;
    const targetY = cellRect.top + cellRect.height / 2;

    // Tipo di impatto
    const hasShip = cellHasShip(atk.target, atk.r, atk.c, data.navi);
    const ship = hasShip ? getShipAt(atk.target, atk.r, atk.c, data.navi) : null;
    const sunk = ship ? isShipSunk(atk.target, ship, storico) : false;

    // Label floating
    const coord = `${COL_LABELS[atk.c]}${atk.r + 1}`;
    const attackerName = isMyAttack ? '🎯 TU' : atk.by;
    const targetName = targetsMe ? 'TE' : atk.target;
    const label = showAttackLabel(attackerName, targetName, coord);

    await sleep(400);

    // Calcola posizione di partenza
    const gridRect = gridContainer.getBoundingClientRect();
    const start = getMissileStart(startDir, gridRect);

    // Lancia missile
    await launchMissileToCell(start.x, start.y, targetX, targetY, startDir, atk);

    // Emoji missile diversa per arma
    const weaponEmoji = atk.weapon === 'cluster' ? '💣' : atk.weapon === 'laser' ? '🔭' : (atk.isEvent ? '🐙' : '🚀');

    // Impatto
    if (atk.isLaser || atk.weapon === 'laser') {
        await playLaserScan(targetX, targetY);
    } else if (sunk) {
        await playBigExplosion(targetX, targetY, ship);
    } else if (hasShip) {
        await playSmallExplosion(targetX, targetY);
    } else {
        await playSplash(targetX, targetY);
    }

    // Pulizia
    if (gridEl) gridEl.classList.remove('grid-highlight');
    hideAttackLabel(label);

    await sleep(300);
}

// ==========================================
// 📍 CALCOLA POSIZIONE PARTENZA MISSILE
// ==========================================
function getMissileStart(direction, gridRect) {
    const cx = gridRect.left + gridRect.width / 2;
    const cy = gridRect.top + gridRect.height / 2;

    switch (direction) {
        case 'bottom':
            return { x: cx, y: window.innerHeight + 60 };
        case 'right':
            return { x: window.innerWidth + 60, y: cy };
        case 'left':
            return { x: -60, y: cy };
        default:
            return { x: cx, y: window.innerHeight + 60 };
    }
}

// ==========================================
// 🚀 MISSILE VERSO CELLA SPECIFICA
// ==========================================
function launchMissileToCell(startX, startY, targetX, targetY, direction, atk) {
    return new Promise(resolve => {
        const missile = document.createElement('div');
        missile.className = 'missile';
        missile.textContent = atk?.weapon === 'cluster' ? '💣' : atk?.weapon === 'laser' ? '🔭' : (atk?.isEvent ? '🐙' : '🚀');
        missile.style.left = startX + 'px';
        missile.style.top = startY + 'px';
        document.body.appendChild(missile);

        // Punto di controllo per curva bezier
        let cpX, cpY;
        switch (direction) {
            case 'bottom':
                cpX = startX + (targetX - startX) * 0.5 + (Math.random() - 0.5) * 80;
                cpY = startY + (targetY - startY) * 0.3;
                break;
            case 'right':
                cpX = startX + (targetX - startX) * 0.3;
                cpY = startY + (targetY - startY) * 0.5 + (Math.random() - 0.5) * 60;
                break;
            case 'left':
                cpX = startX + (targetX - startX) * 0.3;
                cpY = startY + (targetY - startY) * 0.5 + (Math.random() - 0.5) * 60;
                break;
        }

        // Trail di fuoco
        const trailInterval = setInterval(() => {
            const rect = missile.getBoundingClientRect();
            if (rect.width > 0) {
                spawnTrailParticle(rect.left + rect.width / 2, rect.top + rect.height / 2);
            }
        }, 35);

        const duration = 900;
        const startTime = performance.now();

        function animate(now) {
            const t = Math.min((now - startTime) / duration, 1);
            // Easing: accelera poi decelera
            const ease = t < 0.7
                ? (t / 0.7) * (t / 0.7)   // accelera nella prima parte
                : 1 - Math.pow(1 - t, 3);  // decelera verso la fine

            // Bezier quadratica: B(t) = (1-t)²P0 + 2(1-t)tP1 + t²P2
            const mt = 1 - ease;
            const x = mt * mt * startX + 2 * mt * ease * cpX + ease * ease * targetX;
            const y = mt * mt * startY + 2 * mt * ease * cpY + ease * ease * targetY;

            missile.style.left = x + 'px';
            missile.style.top = y + 'px';

            // Tangente per rotazione
            const tx = 2 * mt * (cpX - startX) + 2 * ease * (targetX - cpX);
            const ty = 2 * mt * (cpY - startY) + 2 * ease * (targetY - cpY);
            const angleDeg = Math.atan2(ty, tx) * (180 / Math.PI);
            // 🚀 punta naturalmente a ~315° (upper-right), offset +45°
            const rotation = angleDeg + 45;

            // Scala: cresce avvicinandosi
            const scale = 0.8 + t * 0.7;

            missile.style.transform = `translate(-50%, -50%) rotate(${rotation}deg) scale(${scale})`;

            // Glow crescente
            const glowIntensity = Math.floor(t * 15);
            missile.style.filter = `drop-shadow(0 0 ${glowIntensity}px rgba(231,76,60,${0.3 + t * 0.7}))`;

            if (t < 1) {
                requestAnimationFrame(animate);
            } else {
                clearInterval(trailInterval);
                missile.remove();
                resolve();
            }
        }

        requestAnimationFrame(animate);
    });
}

async function playLaserScan(x, y) {
    // Flash blu
    spawnFlash(x, y, 'rgba(52,152,219,0.6)', 120);

    // Griglia laser
    for (let i = 0; i < 3; i++) {
        const ring = document.createElement('div');
        ring.className = 'water-ripple';
        const size = 20;
        ring.style.left = (x - size/2) + 'px';
        ring.style.top = (y - size/2) + 'px';
        ring.style.width = size + 'px';
        ring.style.height = size + 'px';
        ring.style.borderColor = '#3498db';
        document.body.appendChild(ring);

        ring.animate([
            { width: size+'px', height: size+'px', left: (x-size/2)+'px', top: (y-size/2)+'px', opacity: 0.9 },
            { width: (80+i*25)+'px', height: (80+i*25)+'px', left: (x-(80+i*25)/2)+'px', top: (y-(80+i*25)/2)+'px', opacity: 0 }
        ], { duration: 600+i*150, delay: i*100 }).onfinish = () => ring.remove();
    }

    // Testo
    const txt = document.createElement('div');
    txt.className = 'impact-text';
    txt.style.left = '50%'; txt.style.top = (y-50)+'px';
    txt.style.transform = 'translateX(-50%)';
    txt.style.color = '#5dade2'; txt.style.fontSize = '1.8rem';
    txt.textContent = '🔭 SCANSIONE';
    document.body.appendChild(txt);
    txt.animate([
        { opacity: 0, transform: 'translateX(-50%) translateY(10px)' },
        { opacity: 1, transform: 'translateX(-50%) translateY(0)' },
        { opacity: 0, transform: 'translateX(-50%) translateY(-20px)' }
    ], { duration: 1200 }).onfinish = () => txt.remove();

    await sleep(800);
}

function calcolaCelleArma(weapon, r, c) {
    const cells = [{ r, c }];
    if (weapon === 'cluster') {
        // Croce: cella + 4 adiacenti
        [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr, dc]) => {
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize) {
                cells.push({ r: nr, c: nc });
            }
        });
    } else if (weapon === 'laser') {
        // 3×3
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                const nr = r + dr, nc = c + dc;
                if ((dr !== 0 || dc !== 0) && nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize) {
                    cells.push({ r: nr, c: nc });
                }
            }
        }
    }
    return cells;
}
function hideAttackLabel(label) {
    if (!label) return;
    label.classList.remove('visible');
    setTimeout(() => { if (label.parentNode) label.remove(); }, 400);
}
function spawnTrailParticle(x, y) {

    trail.className = 'missile-trail';

        Math.random() > 0.5 ? '#f39c12' : '#e74c3c'
    }, transparent)`;
    document.body.appendChild(trail);

    trail.animate([
        { opacity: 0.8, transform: 'scale(1)' },
        { opacity: 0, transform: `scale(0.3) translateY(${15 + Math.random() * 20}px)` }
    ], { duration: 400 + Math.random() * 200 }).onfinish = () => trail.remove();
}
