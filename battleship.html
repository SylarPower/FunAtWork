    // Emoji sequenza
    spawnImpactEmoji(x, y, '💥', 2.0);
    setTimeout(() => spawnImpactEmoji(x - 30, y - 20, '🔥', 1.5), 150);
    setTimeout(() => spawnImpactEmoji(x + 30, y + 20, '🔥', 1.5), 250);

    // Testo AFFONDATO!
    setTimeout(() => {
        const txt = document.createElement('div');
        txt.className = 'impact-text';
        txt.style.left = '50%';
        txt.style.top = (y - 60) + 'px';
        txt.style.transform = 'translateX(-50%)';
        txt.style.color = '#ff4757';
        txt.innerHTML = `💀 ${ship?.name || 'NAVE'} AFFONDATA!`;
        document.body.appendChild(txt);

        txt.animate([
            { opacity: 0, transform: 'translateX(-50%) scale(0.5)' },
            { opacity: 1, transform: 'translateX(-50%) scale(1.1)', offset: 0.3 },
            { opacity: 1, transform: 'translateX(-50%) scale(1)', offset: 0.5 },
            { opacity: 1, transform: 'translateX(-50%) scale(1)', offset: 0.8 },
            { opacity: 0, transform: 'translateX(-50%) scale(0.8) translateY(-30px)' }
        ], { duration: 2000 }).onfinish = () => txt.remove();
    }, 300);

    // Shake pesante
    document.body.classList.add('screen-shake-heavy');
    setTimeout(() => document.body.classList.remove('screen-shake-heavy'), 1400);

    // Fumo residuo
    setTimeout(() => spawnSmoke(x, y, 8), 400);

    await sleep(1200);
}

// ==========================================
// 💦 SPLASH (Acqua)
// ==========================================
async function playSplash(x, y) {
    // Flash blu
    spawnFlash(x, y, 'rgba(52,152,219,0.5)', 60);

    // Particelle acqua
    const colors = ['#3498db', '#5dade2', '#85c1e9', '#aed6f1', '#ffffff'];
    spawnParticleBurst(x, y, colors, 20, 100, 700);

    // Gocce che cadono
    spawnWaterDrops(x, y, 12);

    // Cerchi d'onda
    spawnWaterRipples(x, y, 3);

    // Emoji
    spawnImpactEmoji(x, y, '💦', 1.3);

    // Testo "ACQUA"
    setTimeout(() => {
        const txt = document.createElement('div');
        txt.className = 'impact-text';
        txt.style.left = '50%';
        txt.style.top = (y - 50) + 'px';
        txt.style.transform = 'translateX(-50%)';
        txt.style.color = '#85c1e9';
        txt.style.fontSize = '2rem';
        txt.textContent = '~ ACQUA ~';
        document.body.appendChild(txt);

        txt.animate([
            { opacity: 0, transform: 'translateX(-50%) translateY(10px)' },
            { opacity: 1, transform: 'translateX(-50%) translateY(0)' },
            { opacity: 0, transform: 'translateX(-50%) translateY(-20px)' }
        ], { duration: 1200 }).onfinish = () => txt.remove();
    }, 200);

    await sleep(700);
}

// ==========================================
// 🛠️ HELPER PARTICELLE
// ==========================================
function spawnFlash(x, y, color, size) {
    const flash = document.createElement('div');
    flash.className = 'impact-flash';
    flash.style.left = (x - size / 2) + 'px';
    flash.style.top = (y - size / 2) + 'px';
    flash.style.width = size + 'px';
    flash.style.height = size + 'px';
    flash.style.background = `radial-gradient(circle, ${color}, transparent)`;
    document.body.appendChild(flash);

    flash.animate([
        { opacity: 1, transform: 'scale(0.3)' },
        { opacity: 0.8, transform: 'scale(1.5)' },
        { opacity: 0, transform: 'scale(2.5)' }
    ], { duration: 400 }).onfinish = () => flash.remove();
}

function spawnParticleBurst(x, y, colors, count, radius, duration) {
    for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'impact-particle';
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        const size = 3 + Math.random() * 8;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        document.body.appendChild(p);

        const angle = (Math.PI * 2 * i / count) + (Math.random() - 0.5) * 0.5;
        const dist = radius * (0.4 + Math.random() * 0.6);
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist + Math.random() * 30; // gravità
        const dur = duration * (0.6 + Math.random() * 0.4);

        p.animate([
            { transform: 'translate(0,0) scale(1)', opacity: 1 },
            { transform: `translate(${tx * 0.7}px, ${ty * 0.5}px) scale(1)`, opacity: 0.9, offset: 0.3 },
            { transform: `translate(${tx}px, ${ty + 20}px) scale(0)`, opacity: 0 }
        ], { duration: dur }).onfinish = () => p.remove();

        setTimeout(() => { if (p.parentNode) p.remove(); }, dur + 100);
    }
}

function spawnDebris(x, y, count) {
    const chars = ['▪', '▫', '◾', '◽', '▬', '⬛'];
    for (let i = 0; i < count; i++) {
        const d = document.createElement('div');
        d.style.cssText = `position:fixed;left:${x}px;top:${y}px;z-index:7560;pointer-events:none;font-size:${0.5 + Math.random() * 0.8}rem;color:${Math.random() > 0.5 ? '#7f8c8d' : '#566573'};`;
        d.textContent = chars[Math.floor(Math.random() * chars.length)];
        document.body.appendChild(d);

        const angle = Math.random() * Math.PI * 2;
        const dist = 50 + Math.random() * 150;
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist;
        const rot = (Math.random() - 0.5) * 720;

        d.animate([
            { transform: 'translate(0,0) rotate(0)', opacity: 1 },
            { transform: `translate(${tx}px, ${ty + 100}px) rotate(${rot}deg)`, opacity: 0 }
        ], { duration: 800 + Math.random() * 600, easing: 'cubic-bezier(0.25,0.46,0.45,0.94)' })
            .onfinish = () => d.remove();
    }
}

function spawnSmoke(x, y, count) {
    for (let i = 0; i < count; i++) {
        const s = document.createElement('div');
        const size = 15 + Math.random() * 30;
        s.style.cssText = `position:fixed;left:${x - size / 2 + (Math.random() - 0.5) * 40}px;top:${y - size / 2}px;width:${size}px;height:${size}px;border-radius:50%;background:rgba(100,100,100,0.4);z-index:7540;pointer-events:none;`;
        document.body.appendChild(s);

        s.animate([
            { transform: 'translate(0,0) scale(0.5)', opacity: 0.5 },
            { transform: `translate(${(Math.random() - 0.5) * 50}px, ${-40 - Math.random() * 60}px) scale(2)`, opacity: 0 }
        ], { duration: 1500 + Math.random() * 1000, delay: i * 80 })
            .onfinish = () => s.remove();
    }
}

function spawnImpactEmoji(x, y, emoji, scale) {
    const e = document.createElement('div');
    e.style.cssText = `position:fixed;left:${x}px;top:${y}px;z-index:7650;pointer-events:none;font-size:${scale * 2.5}rem;transform:translate(-50%,-50%);`;
    e.textContent = emoji;
    document.body.appendChild(e);

    e.animate([
        { transform: 'translate(-50%,-50%) scale(0)', opacity: 1 },
        { transform: 'translate(-50%,-50%) scale(1.3)', opacity: 1, offset: 0.2 },
        { transform: 'translate(-50%,-50%) scale(1)', opacity: 1, offset: 0.4 },
        { transform: 'translate(-50%,-50%) scale(1)', opacity: 0.8, offset: 0.7 },
        { transform: 'translate(-50%,-50%) scale(0.5)', opacity: 0 }
    ], { duration: 1000 }).onfinish = () => e.remove();

    setTimeout(() => { if (e.parentNode) e.remove(); }, 1100);
}

function spawnWaterDrops(x, y, count) {
    for (let i = 0; i < count; i++) {
        const d = document.createElement('div');
        const size = 3 + Math.random() * 5;
        d.style.cssText = `position:fixed;left:${x}px;top:${y}px;width:${size}px;height:${size * 1.4}px;border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;background:#5dade2;z-index:7555;pointer-events:none;`;
        document.body.appendChild(d);

        const angle = Math.random() * Math.PI * 2;
        const dist = 30 + Math.random() * 80;
        const tx = Math.cos(angle) * dist;
        const peakY = -(30 + Math.random() * 60);

        d.animate([
            { transform: 'translate(0,0)', opacity: 1 },
            { transform: `translate(${tx * 0.5}px, ${peakY}px)`, opacity: 0.9, offset: 0.35 },
            { transform: `translate(${tx}px, ${peakY + 120}px)`, opacity: 0 }
        ], { duration: 600 + Math.random() * 400, easing: 'cubic-bezier(0.25,0.1,0.25,1)' })
            .onfinish = () => d.remove();
    }
}

function spawnWaterRipples(x, y, count) {
    for (let i = 0; i < count; i++) {
        const r = document.createElement('div');
        r.className = 'water-ripple';
        const startSize = 10;
        r.style.left = (x - startSize / 2) + 'px';
        r.style.top = (y - startSize / 2) + 'px';
        r.style.width = startSize + 'px';
        r.style.height = startSize + 'px';
        document.body.appendChild(r);

        const maxSize = 60 + i * 30;
        r.animate([
            { width: startSize + 'px', height: startSize + 'px', left: (x - startSize / 2) + 'px', top: (y - startSize / 2) + 'px', opacity: 0.8, borderWidth: '3px' },
            { width: maxSize + 'px', height: maxSize + 'px', left: (x - maxSize / 2) + 'px', top: (y - maxSize / 2) + 'px', opacity: 0, borderWidth: '1px' }
        ], { duration: 800 + i * 200, delay: i * 150 })
            .onfinish = () => r.remove();
    }
}
// ==========================================
// FIREBASE LISTENER
// ==========================================
function avviaListener() {
    if (unsubscribePartita) unsubscribePartita();
    unsubscribePartita = db.collection("partite").doc(matchId).onSnapshot(doc => {
        const data = doc.data();
        if (!data) { alert("Partita non trovata!"); window.location.href = 'index.html'; return; }
        currentGameData = data;
        lobbyOverlay.style.display = 'none';
        gridSize = parseInt(data.opzioni?.gridSize) || 10;
        const mode = data.opzioni?.mode || 'classic';
        
        featureArmiSpeciali = (mode === 'super' || mode === 'trump');
        featureNaviSpeciali = (mode === 'super' || mode === 'trump');
        featureEventiRandom = (mode === 'trump');
        featurePowerups = (mode === 'super' || mode === 'trump');
        
        // Seleziona navi config con/senza speciali
        naviConfig = buildNaviConfig(gridSize);
        
        // Carica arsenale dal Firebase se disponibile
        if (data.arsenale && data.arsenale[mioNome]) {
            arsenaleLocale = { ...data.arsenale[mioNome] };
        } else if (featureArmiSpeciali || featurePowerups) {
            arsenaleLocale = { ...ARSENALE_INIZIALE };
        }
        if (data.stato === 'attesa' || data.stato === 'piazzamento') {
            animatingRound = -1;
            roundResultsShown = -1;
            isAnimating = false;
        }
        document.getElementById('fixed-home-btn').style.display = 'block';

        if (data.stato === 'attesa') gestisciAttesa(data);
        else if (data.stato === 'piazzamento') gestisciPiazzamento(data);
        else if (data.stato === 'battaglia') gestisciBattaglia(data);
        else if (data.stato === 'conclusa') gestisciConclusa(data);
    });
}

function gestisciAttesa(data) {
    const pronti = data.pronti || [];
    startScreen.style.display = 'none';
    if (!pronti.includes(mioNome)) {
        db.collection("partite").doc(matchId).update({ pronti: firebase.firestore.FieldValue.arrayUnion(mioNome) });
    }
    showGameBanner({
        icon: '⏳', title: `ATTESA GIOCATORI (${pronti.length}/${data.partecipanti.length})`,
        subtitle: 'Tutti devono entrare nella stanza...', color: '#2c3e50',
        buttons: [{ text: '🚫 ANNULLA', onclick: 'annullaPartita()' }], spinner: true
    });
    if (pronti.length >= data.partecipanti.length) {
        db.collection("partite").doc(matchId).update({ stato: 'piazzamento' });
    }
}

function gestisciPiazzamento(data) {
    const prontiPiazz = data.prontiPiazzamento || [];
    if (prontiPiazz.includes(mioNome)) {
        showGameBanner({
            icon: '⏳', title: `PIAZZAMENTO (${prontiPiazz.length}/${data.partecipanti.length})`,
            subtitle: 'Attendi che tutti piazzino le navi...', color: '#8e44ad', spinner: true
        });
        startScreen.style.display = 'none';
        mySection.classList.remove('hidden');
        rightSection.classList.remove('hidden');
        placementPanel.classList.remove('hidden');
        battlePanel.classList.add('hidden');
        const mieNavi = data.navi[mioNome] || [];
        renderGrid('my-grid-container', { size: gridSize, showShips: mieNavi, attacks: [], isMyGrid: true, interactive: false });
        btnPronto.disabled = true;
        btnPronto.textContent = '✅ IN ATTESA...';
    } else {
        removeGameBanner();
        iniziaPiazzamento();
    }
    if (prontiPiazz.length >= data.partecipanti.length) {
        removeGameBanner();
        const starter = data.partecipanti.sort()[0];
        if (mioNome === starter) {
            const mode = data.opzioni?.mode || 'classic';
            const hasSpecial = (mode === 'super' || mode === 'trump');

            const updateData = {
                stato: 'battaglia', turnoCorrente: 1, attacchiTurno: {},
                storicoAttacchi: [], eliminati: [],
                casseAttive: [], eventiLog: [], intelData: {}
            };

            if (hasSpecial) {
                const arsenali = {};
                data.partecipanti.forEach(p => {
                    arsenali[p] = { ...ARSENALE_INIZIALE };
                });
                updateData.arsenale = arsenali;
            }

            db.collection("partite").doc(matchId).update(updateData);
        }
    }
}

function gestisciBattaglia(data) {
    const attacchiTurno = data.attacchiTurno || {};
    const surviving = getSurvivingPlayers(data);
    const ultimoRisolto = data.ultimoRoundRisolto || 0;
    removeGameBanner();

    // Non re-renderizzare durante le animazioni
    if (!isAnimating) {
        iniziaBattaglia(data);
    }

    if (ultimoRisolto > 0 && animatingRound < ultimoRisolto) {
        (async () => {
            // Mostra eventi prima delle animazioni attacco
            if (data.tempestaAttivaTurno === ultimoRisolto) {
                await showEventAnimation('tempesta');
            }
            if (data.krakenSelvaggioTurno === ultimoRisolto) {
                await showEventAnimation('kraken_selvaggio');
            }
            const eventiCassa = (data.eventiLog || []).filter(e => e.turno === ultimoRisolto && e.tipo === 'cassa');
            if (eventiCassa.length > 0) {
                await showEventAnimation('cassa');
            }
            await playAttackAnimations(data, ultimoRisolto);
        })();
    }

    const tuttiAttaccato = surviving.every(p => !!attacchiTurno[p]);
    if (tuttiAttaccato && surviving.length > 0) {
        const resolver = surviving.sort()[0];
        if (mioNome === resolver) risolviTurno(data);
    }
}

function gestisciConclusa(data) {
    const vincitore = data.vincitore;
    const ultimoRisolto = data.ultimoRoundRisolto || 0;

    if (ultimoRisolto > 0 && animatingRound < ultimoRisolto) {
        playAttackAnimations(data, ultimoRisolto);
    }

    if (!isAnimating) {
        iniziaBattaglia(data);
    }
    statusFase.textContent = 'FINE';
    const haVinto = vincitore === mioNome;
    const turni = (data.turnoCorrente || 1) - 1;
    showGameBanner({
        icon: haVinto ? '👑' : '💀',
        title: haVinto ? 'VITTORIA!' : `Ha vinto ${vincitore}!`,
        subtitle: `Partita conclusa in ${turni} turni`,
        color: haVinto ? '#f1c40f' : '#7f8c8d',
        vibrate: haVinto,
        buttons: [
            { text: '🔄 RIVINCITA', onclick: 'creaRivincita()' },
            { text: '🏠 HOME', onclick: 'tornaHome()' }
        ]
    });
    if (haVinto) celebraVittoria();
}

// ==========================================
// RIVINCITA & NAV
// ==========================================
async function creaRivincita() {
    if (!currentGameData) return;
    const v = currentGameData;
    showGameBanner({ icon: '⏳', title: 'CREAZIONE RIVINCITA...', subtitle: 'Attendi...', color: '#3498db', spinner: true });
    try {
        const doc = await db.collection("partite").add({
            gioco: 'battleship', partecipanti: v.partecipanti,
            opzioni: { gridSize }, pronti: [], prontiPiazzamento: [],
            navi: {}, storicoAttacchi: [], attacchiTurno: {},
            turnoCorrente: 1, eliminati: [], vincitore: null,
            stato: 'attesa', timestamp: Date.now()
        });
        await db.collection("partite").doc(matchId).update({
            prossimaPartita: doc.id, prossimaPartitaCreataDa: mioNome
        });
        window.location.href = `battleship.html?matchId=${doc.id}`;
    } catch (e) {
        console.error("Errore rivincita:", e);
        alert("Errore nella creazione della rivincita.");
    }
}

function tornaHome() { if (unsubscribePartita) unsubscribePartita(); window.location.href = 'index.html'; }
async function annullaPartita() {
    if (!confirm("Cancellare la partita per tutti?")) return;
    try { await db.collection("partite").doc(matchId).delete(); window.location.href = 'index.html'; } catch(e) { console.error(e); }
}

// ==========================================
// CELEBRAZIONI
// ==========================================
function celebraVittoria() {
    const colors = ['#f1c40f','#e74c3c','#3498db','#2ecc71','#9b59b6','#ff00ff'];
    for (let i = 0; i < 150; i++) {
        const p = document.createElement('div');
        p.className = 'confetti';
        p.style.left = Math.random()*100+'%'; p.style.top = '-5%';
        p.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
        const s = Math.random()*12+4; p.style.width=s+'px'; p.style.height=s+'px';
        if (Math.random()>0.3) p.style.borderRadius='50%';
        document.body.appendChild(p);
        const drift = (Math.random()-0.5)*300;
        const dur = 2000+Math.random()*3000;
        p.animate([
            { transform:'translate(0,0) rotate(0)', opacity:1 },
            { transform:`translate(${drift}px, ${window.innerHeight+50}px) rotate(${Math.random()*720}deg)`, opacity:0 }
        ], { duration:dur, easing:'ease-in', delay:Math.random()*800 }).onfinish = () => p.remove();
        setTimeout(() => { if (p.parentNode) p.remove(); }, 6000);
    }
}

// ==========================================
// INIT
// ==========================================
if (!matchId) {
    startScreen.style.display = 'block';
} else {
    if (!mioNome) { alert("Effettua il login per giocare."); window.location.href = 'index.html'; }
    else avviaListener();
}
</script>
