<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🏋️ GymTracker Pro</title>
    <link rel="icon" href="gym-icon.png">
	 <link rel="apple-touch-icon" href="gym-icon.png">
    <link rel="manifest" href="gym-manifest.json">
	 <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root{
            --bg:#121212;--c1:#1e1e1e;--c2:#252525;--c3:#2a2a2a;
            --tx:#eee;--tx2:#888;--tx3:#666;--brd:#2a2a2a;
            --acc:#03dac6;--acc2:#018786;--red:#cf6679;--grn:#27ae60;
            --pur:#9b59b6;--pur2:#bb86fc;--yel:#f1c40f;
        }
        [data-theme="light"]{
            --bg:#f0f2f5;--c1:#ffffff;--c2:#f5f5f5;--c3:#e8e8e8;
            --tx:#222;--tx2:#666;--tx3:#999;--brd:#ddd;
            --acc:#018786;--acc2:#03dac6;--red:#d32f2f;--grn:#2e7d32;
        }
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
        html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:var(--bg);color:var(--tx);min-height:100vh;
            min-height:-webkit-fill-available;
            padding-bottom:calc(70px + env(safe-area-inset-bottom,0px));
            overscroll-behavior-y:contain;
        }
        .topbar{
            position:sticky;top:0;z-index:100;background:var(--c1);
            border-bottom:1px solid var(--brd);padding:10px 16px;
            display:flex;align-items:center;justify-content:space-between;gap:8px;
            backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
        }
        .topbar h1{font-size:1.05rem;color:var(--acc);white-space:nowrap;}
        .topbar h1 span{color:var(--tx);}
        .ctn{max-width:600px;margin:auto;padding:12px;}
        .card{background:var(--c1);padding:16px;border-radius:14px;margin-bottom:12px;border:1px solid var(--brd);}
        .card h3{color:var(--acc);font-size:1rem;margin-bottom:12px;}

        /* Buttons */
.btn-circle {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: none;
    background: var(--c2);
    color: var(--tx);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1.1rem;
}

/* Rendi gli input numerici puliti su mobile */
input[type=number]::-webkit-inner-spin-button, 
input[type=number]::-webkit-outer-spin-button { 
    -webkit-appearance: none; 
    margin: 0; 
}

.ec {
    transition: transform 0.1s ease;
}

.ec:active {
    transform: scale(0.99); /* Feedback alla pressione */
}
        button{
            font-family:inherit;border-radius:8px;cursor:pointer;font-weight:600;
            font-size:0.85rem;border:1px solid var(--brd);background:var(--c2);
            color:var(--tx);padding:10px 18px;transition:transform .1s;
            touch-action:manipulation;-webkit-appearance:none;
        }
        button:active{transform:scale(.96);}
        .bp{background:var(--acc)!important;color:#000!important;border-color:var(--acc2)!important;}
        .bd{background:var(--red)!important;color:#fff!important;border:none!important;}
        .bs{background:#333!important;color:#eee!important;border:none!important;}
        .bpp{background:var(--pur)!important;color:#fff!important;border:none!important;}
        .bpp.on{background:var(--pur2)!important;}
        .bg{background:var(--grn)!important;color:#fff!important;border:none!important;}
        .tb{background:var(--c2);color:var(--tx);border:1px solid var(--brd);padding:8px 12px;border-radius:8px;font-size:.82rem;}
        .badge{background:var(--acc);color:#000;padding:4px 12px;border-radius:15px;font-weight:bold;font-size:.72rem;}

        /* Input */
        input,select,textarea{
            width:100%;padding:12px 14px;background:var(--c2);color:var(--tx);
            border:1px solid var(--brd);border-radius:10px;font-size:16px;
            font-family:inherit;-webkit-appearance:none;
        }
        input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc);}
        textarea{resize:none;}

        /* Stats */
        .sg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
        @media(max-width:400px){.sg{grid-template-columns:repeat(2,1fr);}}
        .sb{background:var(--c2);padding:14px 8px;border-radius:12px;text-align:center;border:1px solid var(--brd);}
        .sb.hl{background:linear-gradient(135deg,#1a3a3a,#0d2626);border-color:var(--acc);}
        [data-theme="light"] .sb.hl{background:linear-gradient(135deg,#e0f2f1,#b2dfdb);}
        .sn{font-size:1.5rem;font-weight:900;color:var(--acc);}
        .sd{font-size:.58rem;color:var(--tx2);margin-top:3px;text-transform:uppercase;letter-spacing:.5px;}

        /* Day cards */
        .dc{
            display:flex;justify-content:space-between;align-items:center;
            background:var(--c2);padding:14px;margin:8px 0;border-radius:12px;
            border:1px solid var(--brd);cursor:pointer;touch-action:manipulation;
        }
        .dc:active{border-color:var(--acc);}
        .dc h4{color:var(--acc);font-size:.92rem;margin-bottom:3px;}
        .dc span{font-size:.72rem;color:var(--tx2);}
        .dc .da{display:flex;gap:5px;align-items:center;}
        .dc .da button{padding:6px 12px;font-size:.78rem;}

        /* Exercise card */
        .ec{background:var(--c2);border-radius:12px;margin:10px 0;border:1px solid var(--brd);overflow:hidden;}
        .ec.ssel{border:2px dashed var(--pur);}
        .ec.ssel2{border:2px solid var(--pur2);box-shadow:0 0 8px rgba(187,134,252,.3);}
        .ec.hss{border-left:4px solid var(--pur);}
        .eh{display:flex;align-items:center;gap:10px;padding:12px;}
        .ei{flex:1;min-width:0;}
        .ei h4{color:var(--tx);font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .ei .em{font-size:.68rem;color:var(--tx2);}
        .ea{display:flex;gap:2px;}
        .ea button{padding:6px;background:none;border:none;font-size:1.1rem;min-width:36px;min-height:36px;}

        /* Set-by-set tracking */
        .sets-track{padding:4px 12px 12px;}
        .set-row{
            display:flex;align-items:center;gap:6px;padding:6px 8px;margin:3px 0;
            background:var(--c1);border-radius:8px;border:1px solid var(--brd);
        }
        .set-row.done{background:rgba(39,174,96,.12);border-color:rgba(39,174,96,.3);}
        .set-row .set-num{font-size:.7rem;color:var(--tx2);width:18px;text-align:center;font-weight:bold;}
        .set-row input{width:52px;padding:6px 3px;margin:0;text-align:center;font-size:.82rem;background:var(--c2);border:1px solid var(--brd);border-radius:6px;}
        .set-row .set-x{font-size:.7rem;color:var(--tx3);}
        .set-row .set-chk{
            width:32px;height:32px;border-radius:50%;border:2px solid var(--brd);
            background:none;color:var(--tx3);font-size:.9rem;display:flex;
            align-items:center;justify-content:center;padding:0;flex-shrink:0;
        }
        .set-row.done .set-chk{background:var(--grn);border-color:var(--grn);color:#fff;}
        .set-row .rm-label{font-size:.58rem;color:var(--acc);margin-left:auto;white-space:nowrap;}
        .sets-header{display:flex;justify-content:space-between;align-items:center;padding:0 12px;margin-bottom:2px;}
        .sets-header span{font-size:.6rem;color:var(--tx3);text-transform:uppercase;}
        .add-set-btn{width:100%;padding:6px;font-size:.75rem;border:1px dashed var(--brd);background:none;color:var(--tx2);border-radius:6px;margin-top:4px;}

        /* GIF expanded */
        .egif{display:none;padding:0 12px 10px;text-align:center;}
        .egif.open{display:block;}
        .egif img{max-width:100%;max-height:250px;border-radius:12px;background:var(--c1);}

        /* Banners */
        .bprog{margin:0 12px 8px;padding:8px 12px;background:rgba(241,196,15,.08);border:1px solid rgba(241,196,15,.2);border-radius:8px;font-size:.72rem;color:var(--yel);}
        .blast{margin:0 12px 8px;padding:8px 12px;background:rgba(3,218,198,.06);border:1px solid rgba(3,218,198,.15);border-radius:8px;font-size:.72rem;color:var(--acc);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;}
        .blast button{background:none;border:none;color:var(--acc);cursor:pointer;font-weight:bold;font-size:.72rem;padding:4px 8px;}

        /* Params row */
        .prow{display:flex;gap:6px;padding:4px 12px 8px;flex-wrap:wrap;align-items:center;}
        .prow .pm{text-align:center;}
        .prow .pm label{font-size:.55rem;color:var(--tx3);text-transform:uppercase;display:block;margin-bottom:2px;}
        .prow .pc{display:flex;align-items:center;gap:1px;}
        .prow .pc button{width:28px;height:30px;padding:0;font-size:.82rem;background:var(--c1);border:1px solid var(--brd);color:var(--tx);border-radius:6px;min-height:30px;}
        .prow .pc input{width:48px;padding:5px 2px;margin:0;text-align:center;font-size:.82rem;background:var(--c1);border:1px solid var(--brd);border-radius:6px;}
        .tbtn{padding:8px 12px;background:var(--c1);border:1px solid var(--brd);color:var(--acc);border-radius:8px;font-size:.9rem;min-height:34px;}

        /* Extra */
        .eex{display:none;padding:0 12px 12px;}
        .eex.open{display:block;}
        .eex label{font-size:.62rem;color:var(--tx3);text-transform:uppercase;display:block;margin:8px 0 3px;}
        .eex input,.eex textarea{font-size:.85rem;}

        /* Superset */
        .ssb{border:1px solid rgba(155,89,182,.2);border-radius:14px;padding:8px;margin:10px 0;background:rgba(155,89,182,.03);}
        .ssb .ssl{font-size:.62rem;color:var(--pur2);text-transform:uppercase;font-weight:bold;letter-spacing:1px;display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;padding:0 6px;}
        .ssb .ssl button{font-size:.62rem;color:var(--red);background:none;border:none;cursor:pointer;padding:4px 8px;}
        .ssb .ec{margin:5px 0;}

        /* Modal */
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:10000;justify-content:center;align-items:flex-end;}
        @media(min-width:600px){.modal{align-items:center;}}
        .mc{background:var(--c1);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;padding:20px 16px;padding-bottom:calc(16px + env(safe-area-inset-bottom));}
        @media(min-width:600px){.mc{border-radius:20px;max-height:85vh;}}
        .mc h2{color:var(--acc);text-align:center;margin-bottom:12px;font-size:1.05rem;}

        /* Ex selector */
        .exo{display:flex;align-items:center;gap:10px;padding:10px;background:var(--c2);margin:5px 0;border-radius:10px;cursor:pointer;border:1px solid transparent;touch-action:manipulation;min-height:58px;}
        .exo:active{border-color:var(--acc);background:var(--c3);}
        .exo img{width:44px;height:44px;border-radius:8px;object-fit:cover;background:var(--c1);flex-shrink:0;}
        .exo .on{font-size:.82rem;color:var(--tx);font-weight:600;}
        .exo .om{font-size:.68rem;color:var(--tx2);}
        .mch{display:inline-block;padding:5px 11px;border-radius:20px;font-size:.68rem;border:1px solid var(--brd);background:var(--c1);color:var(--tx2);cursor:pointer;margin:2px;white-space:nowrap;}
        .mch.on{background:var(--acc);color:#000;border-color:var(--acc);font-weight:bold;}
        .chips{display:flex;overflow-x:auto;gap:4px;padding:4px 0;-webkit-overflow-scrolling:touch;}
        .chips::-webkit-scrollbar{display:none;}

        /* Achievements */
        .ag{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
        @media(min-width:500px){.ag{grid-template-columns:repeat(4,1fr);}}
        .ac{padding:10px 6px;border-radius:10px;text-align:center;border:1px solid var(--brd);}
        .ac.ok{background:linear-gradient(135deg,#1a3a3a,#0d2626);border-color:var(--acc);}
        [data-theme="light"] .ac.ok{background:linear-gradient(135deg,#e0f2f1,#b2dfdb);}
        .ac.no{background:var(--c1);opacity:.3;}
        .aci{font-size:1.5rem;}.act{font-size:.62rem;font-weight:bold;color:var(--tx);margin-top:2px;}.acd{font-size:.52rem;color:var(--tx2);margin-top:1px;}

        /* History */
        .hd{color:var(--acc);font-size:.78rem;font-weight:bold;margin-top:14px;padding-bottom:4px;border-bottom:1px solid var(--brd);}
        .he{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:.72rem;border-bottom:1px solid var(--c1);}

        /* Volume chart */
        #vol-chart{width:100%;height:120px;border-radius:8px;background:var(--c2);}

        /* Muscle map */
        .mm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
        .mm-col{text-align:center;}
        .mm-col h4{font-size:.7rem;color:var(--tx2);margin-bottom:6px;text-transform:uppercase;}
        .mm-part{
            display:inline-block;padding:5px 10px;margin:2px;border-radius:15px;
            font-size:.62rem;font-weight:600;border:1px solid var(--brd);
            background:var(--c2);color:var(--tx2);transition:all .3s;
        }
        .mm-part.active{color:#fff;border-color:transparent;}
        .mm-part.low{background:#1b5e20;}.mm-part.med{background:#e65100;}.mm-part.high{background:#b71c1c;}

        /* Bottom nav */
        .bn{position:fixed;bottom:0;left:0;right:0;background:var(--c1);border-top:1px solid var(--brd);display:flex;justify-content:space-around;padding:6px 0 calc(6px + env(safe-area-inset-bottom));z-index:100;}
        .bn button{background:none;border:none;color:var(--tx3);font-size:.52rem;cursor:pointer;padding:6px 12px;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:55px;}
        .bn button .ni{font-size:1.15rem;}
        .bn button.on{color:var(--acc);}

        /* Confetti canvas */
        #confetti{position:fixed;inset:0;z-index:99999;pointer-events:none;}

        /* 1RM badge */
        .rm-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.6rem;font-weight:bold;background:rgba(3,218,198,.12);color:var(--acc);margin-left:4px;}

        /* Misc */
        .emp{text-align:center;padding:25px;color:var(--tx3);}.emp .eic{font-size:2.2rem;margin-bottom:6px;}
        .tss{font-size:.52rem;padding:2px 6px;background:rgba(155,89,182,.15);color:var(--pur2);border-radius:10px;}
        .sph{padding:10px;background:rgba(155,89,182,.1);border:1px solid rgba(155,89,182,.2);border-radius:10px;margin-bottom:12px;font-size:.78rem;color:var(--pur2);}
        .abar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
        .abar button{flex:1;min-width:0;padding:10px 6px;font-size:.72rem;white-space:nowrap;}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}.apulse{animation:pulse 1s infinite;}
        .pr-flash{animation:prFlash .6s ease;position:relative;}
        @keyframes prFlash{0%{box-shadow:0 0 0 rgba(241,196,15,0);}50%{box-shadow:0 0 30px rgba(241,196,15,.5);}100%{box-shadow:0 0 0 rgba(241,196,15,0);}}
    </style>
</head>
<body>
<canvas id="confetti"></canvas>

<!-- TOP BAR -->
<div class="topbar">
    <button class="tb" onclick="location.href='index.html'">🏠 Home</button>
    <h1>🏋️ GymTracker <span>Pro</span></h1>
    <div style="display:flex;gap:6px;align-items:center;">
        <button class="tb" onclick="toggleTheme()" id="thBtn" style="padding:8px;">🌙</button>
        <span class="badge" id="ubadge"></span>
    </div>
</div>

<div class="ctn">

<!-- LOADING -->
<div id="vLoad" class="card" style="text-align:center;padding:60px 20px;">
    <div style="font-size:3rem;" class="apulse">🏋️</div>
    <p style="margin-top:12px;color:var(--tx2);">Caricamento esercizi...</p>
</div>

<!-- ===== HOME ===== -->
<div id="vHome" style="display:none;">

    <div class="card"><div class="sg">
        <div class="sb"><div class="sn" id="s0">0</div><div class="sd">Workouts</div></div>
        <div class="sb"><div class="sn" id="s1">0</div><div class="sd">Serie</div></div>
        <div class="sb"><div class="sn" id="s2">0</div><div class="sd">🔥 Streak</div></div>
        <div class="sb hl"><div class="sn" id="s3">0</div><div class="sd">🎯 PRs</div></div>
    </div></div>

    <!-- Volume Chart -->
    <div class="card">
        <h3>📈 Volume Settimanale</h3>
        <canvas id="vol-chart"></canvas>
    </div>

    <!-- Muscle Map -->
    <div class="card">
        <h3>💪 Mappa Muscolare — Oggi</h3>
        <div id="muscle-map"></div>
    </div>

    <!-- Days -->
    <div class="card">
        <h3>📅 Le Tue Giornate</h3>
        <div style="display:flex;gap:8px;margin-bottom:12px;">
            <input id="iDay" placeholder="Nome giornata (Push, Pull, Legs...)" style="flex:1;margin:0;">
            <button class="bp" onclick="addDay()">+ Giorno</button>
        </div>
        <div id="dList"></div>
    </div>

    <!-- Achievements -->
    <div class="card"><h3>🏆 Achievements</h3><div id="aList" class="ag"></div></div>

    <!-- History -->
    <div class="card"><h3>📊 Cronologia</h3><div id="hList" style="max-height:350px;overflow-y:auto;-webkit-overflow-scrolling:touch;"></div></div>
</div>

<!-- ===== DAY VIEW ===== -->
<div id="vDay" style="display:none;">
    <div class="card">
        <h3 id="dTitle" style="margin-bottom:8px;">📅 Giornata</h3>
        <div class="abar">
            <button class="bs" onclick="goHome()">← Indietro</button>
            <button class="bp" onclick="openSel()">+ Esercizio</button>
            <button class="bpp" id="bSS" onclick="togSS()">🔗 Superserie</button>
            <button class="bg" onclick="complWO()">✅ Completa</button>
        </div>
        <div style="display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;">
            <button class="bs" onclick="openPlate()" style="font-size:.72rem;padding:6px 10px;">🧮 Plate Calculator</button>
        </div>
        <div id="ssHint" class="sph" style="display:none;"></div>
        <div id="eList"></div>
    </div>
</div>

</div><!-- end .ctn -->

<!-- BOTTOM NAV -->
<div class="bn">
    <button class="on" onclick="goHome()"><span class="ni">🏠</span>Home</button>
    <button onclick="goHome();setTimeout(()=>document.getElementById('hList')?.scrollIntoView({behavior:'smooth'}),150)"><span class="ni">📊</span>Cronologia</button>
    <button onclick="goHome();setTimeout(()=>document.getElementById('aList')?.scrollIntoView({behavior:'smooth'}),150)"><span class="ni">🏆</span>Obiettivi</button>
</div>

<!-- MODAL: SELETTORE ESERCIZI -->
<div id="mSel" class="modal">
<div class="mc">
    <h2>📋 Seleziona Esercizio</h2>
    <input id="exQ" placeholder="Cerca esercizio, muscolo, attrezzatura..." style="margin:0 0 8px;" oninput="filEx()">
    <div id="mChips" class="chips"></div>
    <div id="exR" style="overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;margin-top:8px;"></div>
    <button class="bs" onclick="closeSel()" style="width:100%;margin-top:10px;">Chiudi</button>
</div>
</div>

<div id="mProg" class="modal" onclick="if(event.target===this)this.style.display='none'">
    <div class="mc" style="max-width:500px;">
        <h2 id="progTitle">Andamento Esercizio</h2>
        <div style="height:300px; width:100%;">
            <canvas id="exChart"></canvas>
        </div>
        <button class="bs" onclick="document.getElementById('mProg').style.display='none'" style="width:100%;margin-top:15px;">Chiudi</button>
    </div>
</div>
<script>
// =============================================
// 🔥 FIREBASE
// =============================================
firebase.initializeApp({apiKey:"AIzaSyCNo7o2Ft22JDEyJ97BspE3Kur5DNAPKQc",authDomain:"funatwork-cd237.firebaseapp.com",projectId:"funatwork-cd237",storageBucket:"funatwork-cd237.firebasestorage.app",messagingSenderId:"798226885203",appId:"1:798226885203:web:ce83f4d9e96b82266274a6"});
const db=firebase.firestore();
const MIO=localStorage.getItem('mioNome');
if(!MIO){alert('Devi prima fare login dal portale!');location.href='index.html';}
document.getElementById('ubadge').textContent=MIO;

// --- CONFIGURAZIONE GITHUB ---
const GITHUB_USER = "SylarPower"; 
const GITHUB_REPO = "FunAtWork";
const MEDIA_PATH = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/esercizi/`;

let EX_DB = [];

async function loadExDB() {
    try {
        // Carica il file exercises.json dal tuo server/repo
        const r = await fetch('exercises.json');
        if (!r.ok) throw new Error("File non trovato");
        EX_DB = await r.json();
        console.log('✅ Archivio pronto: ' + EX_DB.length + ' esercizi');
    } catch(e) {
        console.error("Errore caricamento exercises.json, uso fallback locale");

function fuzzyMatch(text,query){

text=text.toLowerCase();
query=query.toLowerCase();

let ti=0;
let qi=0;

while(ti<text.length && qi<query.length){

if(text[ti]===query[qi]) qi++;

ti++;

}

return qi===query.length;

}

// COMPLETE WORKOUT
// =============================================
function complWO(){
    if(!confirm("Completare l'allenamento?"))return;
    const day=gD();if(!day||!day.exs.length)return;
    const today=new Date().toISOString().split('T')[0];
    const yest=new Date(Date.now()-864e5).toISOString().split('T')[0];
    const s=D.st;
    let newPR=false;

    if(s.lwd===yest)s.sk=(s.sk||0)+1;else if(s.lwd!==today)s.sk=1;
    s.lwd=today;
    s.tw=(s.tw||0)+1;
    const totalSets=day.exs.reduce((a,e)=>a+(e.sd?e.sd.filter(x=>x.done).length:0),0);
    s.ts=(s.ts||0)+totalSets;
    s.te=(s.te||0)+day.exs.length;
    if(!s.pr)s.pr={};

    day.exs.forEach(e=>{
        const maxW=e.sd?Math.max(...e.sd.map(x=>x.w)):0;
        if(maxW>(s.pr[e.exerciseId]||0)){s.pr[e.exerciseId]=maxW;newPR=true;}
        // Log
        const completedSets=e.sd?e.sd.filter(x=>x.done):e.sd;
        const avgR=completedSets.length?Math.round(completedSets.reduce((a,x)=>a+x.r,0)/completedSets.length):0;
        D.hist.push({eid:e.exerciseId,name:e.name,dt:new Date().toISOString(),s:completedSets.length,r:avgR,w:maxW,rest:e.rest,seat:e.seat,notes:e.notes,sd:e.sd.map(x=>({r:x.r,w:x.w}))});
    });

    // Progressions
    day.exs.forEach(e=>{
        if(e.pF&&e.sd){
            e.sd.forEach(s=>{s.w=Math.round((s.w+2.5)*10)/10;s.r=Math.max(1,s.r-1);s.done=false;});
            e.pF=false;
        }else if(e.sd){e.sd.forEach(s=>s.done=false);}
    });

    save();goHome();

    // Confetti se PR!
    if(newPR){alert('🎉 NUOVO PERSONAL RECORD!');fireConfetti();}
    else alert('✅ Allenamento completato!');
}

// 📈 VOLUME CHART (ultimi 7 giorni)
// =============================================
function renVol() {
    const canvas = document.getElementById('vol-chart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    canvas.width = canvas.offsetWidth * dpr;
    canvas.height = 130 * dpr;
    ctx.scale(dpr, dpr);
    const W = canvas.offsetWidth, H = 130;

    // Trova il lunedì della settimana corrente
    const now = new Date();
    const dow = now.getDay(); // 0=dom..6=sab
    const diffToMon = dow === 0 ? -6 : 1 - dow; // distanza da lunedì
    const monday = new Date(now);
    monday.setDate(now.getDate() + diffToMon);
    monday.setHours(0,0,0,0);

    const labels = ['Lun','Mar','Mer','Gio','Ven'];
    const days = [];

    for (let i = 0; i < 5; i++) {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        const key = d.toISOString().split('T')[0];
        const today = now.toISOString().split('T')[0];

        let vol = 0;
        if (D.hist) {
            D.hist.filter(l => l.dt && l.dt.startsWith(key)).forEach(l => {
                vol += (l.s || 0) * (l.r || 0) * (l.w || 0);
            });
        }
        days.push({ label: labels[i], vol, isToday: key === today });
    }

    const maxV = Math.max(...days.map(d => d.vol), 1);
    const barW = (W / 5) - 12;
    ctx.clearRect(0, 0, W, H);

    days.forEach((d, i) => {
        const x = i * (W / 5) + 8;
        const barH = Math.max(4, (d.vol / maxV) * (H - 45));
        const y = H - 30 - barH;

        const grad = ctx.createLinearGradient(x, y, x, H - 25);
        if (d.isToday) {
            grad.addColorStop(0, '#f1c40f');
            grad.addColorStop(1, '#e67e22');
        } else if (d.vol > 0) {
            grad.addColorStop(0, '#03dac6');
            grad.addColorStop(1, '#018786');
        } else {
            grad.addColorStop(0, '#333');
            grad.addColorStop(1, '#222');
        }

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(x, y, barW, barH, 6);
        ctx.fill();

        // Label
        ctx.fillStyle = d.isToday ? '#f1c40f' : '#888';
        ctx.font = (d.isToday ? 'bold ' : '') + '10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(d.label, x + barW / 2, H - 8);

        // Valore
        if (d.vol > 0) {
            ctx.fillStyle = d.isToday ? '#f1c40f' : '#03dac6';
            ctx.font = 'bold 9px sans-serif';
            const txt = d.vol >= 10000 ? (d.vol / 1000).toFixed(0) + 'k' : Math.round(d.vol);
            ctx.fillText(txt, x + barW / 2, y - 6);
        }
    });
}

// Ridisegna il chart quando si ridimensiona
window.addEventListener('resize',()=>{if(D)renVol();});

// =============================================
// 💪 MAPPA MUSCOLARE
// =============================================
function renMuscle(){
    const c=document.getElementById('muscle-map');
    if(!c)return;

    // Calcola volume per body part da esercizi di oggi
    const today=new Date().toISOString().split('T')[0];
    const todayLogs=D.hist?D.hist.filter(l=>l.dt.startsWith(today)):[];
    const bpVol={};
    todayLogs.forEach(l=>{
        const def=exDef(l.eid);
        if(!def)return;
        const vol=(l.s||0)*(l.r||0)*(l.w||1);
        const bp=def.bp||'other';
        bpVol[bp]=(bpVol[bp]||0)+vol;
        // Target muscle
        const tgt=def.tgt||'';
        if(tgt)bpVol[tgt]=(bpVol[tgt]||0)+vol;
    });

    const maxVol=Math.max(...Object.values(bpVol),1);

    function intensity(name){
        const v=bpVol[name]||bpVol[name.toLowerCase()]||0;
        if(!v)return '';
        const pct=v/maxVol;
        if(pct>.6)return 'active high';
        if(pct>.3)return 'active med';
        return 'active low';
    }

    const front=['chest','shoulders','upper arms','lower arms','waist','upper legs','lower legs'];
    const back=['back','neck','waist','upper legs','lower legs','glutes'];

    // Also check target muscles
    const targets=['pectorals','delts','biceps','triceps','lats','traps','quads','hamstrings','glutes','calves','abs','forearms'];

    let h=`<div class="mm-grid"><div class="mm-col"><h4>Anteriore</h4>`;
    front.forEach(m=>{h+=`<span class="mm-part ${intensity(m)}">${m}</span> `;});
    h+=`</div><div class="mm-col"><h4>Posteriore</h4>`;
    back.forEach(m=>{h+=`<span class="mm-part ${intensity(m)}">${m}</span> `;});
    h+=`</div></div>`;

    // Target muscles detail
    const activeTgts=targets.filter(t=>bpVol[t]);
    if(activeTgts.length){
        h+=`<div style="margin-top:10px;"><span style="font-size:.62rem;color:var(--tx3);text-transform:uppercase;">Muscoli target:</span><br>`;
        activeTgts.forEach(t=>{h+=`<span class="mm-part ${intensity(t)}">${t}</span> `;});
        h+=`</div>`;
    }

    if(!todayLogs.length) h=`<div class="emp" style="padding:15px;"><div class="eic">💪</div>Allena oggi per vedere la mappa muscolare</div>`;
    c.innerHTML=h;
}

// =============================================
// 🎊 CONFETTI
// =============================================
function fireConfetti(){
    const canvas=document.getElementById('confetti');
    const ctx=canvas.getContext('2d');
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    canvas.style.display='block';

    const particles=[];
    const colors=['#f1c40f','#e74c3c','#3498db','#2ecc71','#9b59b6','#ff69b4','#03dac6'];

    for(let i=0;i<150;i++){
        particles.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height*0.5-canvas.height*0.3,
            vx:(Math.random()-0.5)*8,
            vy:Math.random()*3+2,
            w:Math.random()*10+4,
            h:Math.random()*6+2,
            color:colors[Math.floor(Math.random()*colors.length)],
            rot:Math.random()*360,
            rv:(Math.random()-0.5)*10,
            life:1
        });
    }

    let frame=0;
    function animate(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        let alive=false;
        particles.forEach(p=>{
            if(p.life<=0)return;
            alive=true;
            p.x+=p.vx;
            p.y+=p.vy;
            p.vy+=0.1;
            p.rot+=p.rv;
            p.life-=0.008;

            ctx.save();
            ctx.translate(p.x,p.y);
            ctx.rotate(p.rot*Math.PI/180);
            ctx.fillStyle=p.color;
            ctx.globalAlpha=Math.max(0,p.life);
            ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
            ctx.restore();
        });
        frame++;
        if(alive&&frame<300) requestAnimationFrame(animate);
        else{ctx.clearRect(0,0,canvas.width,canvas.height);canvas.style.display='none';}
    }
    animate();
}

function toggleTheme(){
    const curr=document.documentElement.getAttribute('data-theme');
    const next=curr==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',next);
    localStorage.setItem('gym-theme',next);
    document.getElementById('thBtn').textContent=next==='dark'?'🌙':'☀️';
    if(D)renVol();
}

})();

let myChart = null;
function showProgression(id, name) {
    document.getElementById('mProg').style.display = 'flex';
    document.getElementById('progT').textContent = name;
    
    const data = D.hist.map(h => {
        const e = h.exs.find(ex => ex.exerciseId === id);
        return e ? { d: h.date, v: calcVolEx(e) } : null;
    }).filter(x => x).sort((a,b) => new Date(a.d) - new Date(b.d));

    const ctx = document.getElementById('chartC').getContext('2d');
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.map(x => new Date(x.d).toLocaleDateString()),
            datasets: [{ label: 'Volume (kg)', data: data.map(x => x.v), borderColor: '#03dac6', tension: 0.2 }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}
