<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GymTracker Pro</title>
    <link rel="icon" href="gym-icon.png">
    <link rel="apple-touch-icon" href="gym-icon.png">
    <link rel="manifest" href="gym-manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg:#121212;--c1:#1e1e1e;--c2:#252525;--c3:#2a2a2a;
            --tx:#eee;--tx2:#999;--tx3:#666;--brd:#2a2a2a;
            --acc:#03dac6;--acc2:#018786;--red:#cf6679;--grn:#27ae60;
            --pur:#9b59b6;--pur2:#bb86fc;--yel:#f1c40f;
        }
        [data-theme="light"] {
            --bg:#f0f2f5;--c1:#ffffff;--c2:#f5f5f5;--c3:#e8e8e8;
            --tx:#222;--tx2:#666;--tx3:#999;--brd:#ddd;
            --acc:#018786;--acc2:#03dac6;--red:#d32f2f;--grn:#2e7d32;
        }
        * { box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0; }
        html { scroll-behavior:smooth;-webkit-text-size-adjust:100%; }
        body {
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:var(--bg);color:var(--tx);min-height:100vh;
            min-height:-webkit-fill-available;
            padding-bottom:calc(75px + env(safe-area-inset-bottom,0px));
            overscroll-behavior-y:contain;
        }

        /* ===== TOAST ===== */
        .toast {
            position:fixed;top:-80px;left:50%;transform:translateX(-50%);
            z-index:99999;padding:14px 24px;border-radius:14px;
            font-size:.88rem;font-weight:600;
            backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            transition:top .4s cubic-bezier(.34,1.56,.64,1);
            max-width:90vw;text-align:center;pointer-events:none;
            box-shadow:0 8px 32px rgba(0,0,0,.3);
        }
        .toast.show { top:calc(16px + env(safe-area-inset-top,0px)); }
        .toast.ok { background:rgba(39,174,96,.95);color:#fff; }
        .toast.warn { background:rgba(241,196,15,.95);color:#000; }
        .toast.err { background:rgba(207,102,121,.95);color:#fff; }
        .toast.info { background:rgba(30,30,30,.95);color:var(--acc);border:1px solid var(--brd); }

        /* ===== TOPBAR ===== */
        .topbar {
            position:sticky;top:0;z-index:100;background:rgba(30,30,30,.92);
            border-bottom:1px solid var(--brd);padding:12px 16px;
            display:flex;align-items:center;justify-content:space-between;gap:8px;
            backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
        }
        [data-theme="light"] .topbar { background:rgba(255,255,255,.92); }
        .topbar h1 { font-size:1.1rem;color:var(--acc);white-space:nowrap; }
        .topbar h1 span { color:var(--tx); }

        .ctn { max-width:600px;margin:auto;padding:12px; }
        .card { background:var(--c1);padding:18px;border-radius:16px;margin-bottom:14px;border:1px solid var(--brd); }
        .card h3 { color:var(--acc);font-size:1rem;margin-bottom:14px; }

        /* ===== BUTTONS ===== */
        button {
            font-family:inherit;border-radius:10px;cursor:pointer;font-weight:600;
            font-size:.85rem;border:1px solid var(--brd);background:var(--c2);
            color:var(--tx);padding:12px 18px;transition:all .15s;
            touch-action:manipulation;-webkit-appearance:none;
            min-height:44px; /* Touch target */
        }
        button:active { transform:scale(.96);opacity:.85; }
        .bp { background:var(--acc)!important;color:#000!important;border-color:var(--acc2)!important; }
        .bd { background:var(--red)!important;color:#fff!important;border:none!important; }
        .bs { background:#333!important;color:#eee!important;border:none!important; }
        .bpp { background:var(--pur)!important;color:#fff!important;border:none!important; }
        .bg { background:var(--grn)!important;color:#fff!important;border:none!important; }
        .tb { background:var(--c2);color:var(--tx);border:1px solid var(--brd);padding:8px 12px;border-radius:10px;font-size:.82rem; }
        .badge { background:var(--acc);color:#000;padding:5px 14px;border-radius:20px;font-weight:bold;font-size:.72rem; }

        /* ===== INPUTS ===== */
        input,select,textarea {
            width:100%;padding:14px 16px;background:var(--c2);color:var(--tx);
            border:1px solid var(--brd);border-radius:12px;font-size:16px;
            font-family:inherit;-webkit-appearance:none;transition:border-color .2s;
        }
        input:focus,select:focus,textarea:focus { outline:none;border-color:var(--acc); }
        textarea { resize:none; }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none;margin:0; }

        /* ===== SHAKE ANIMATION ===== */
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }
        .shake { animation:shake .35s ease;border-color:var(--red)!important; }

        /* ===== STATS ===== */
        .sg { display:grid;grid-template-columns:repeat(4,1fr);gap:8px; }
        @media(max-width:400px) { .sg { grid-template-columns:repeat(2,1fr); } }
        .sb { background:var(--c2);padding:16px 8px;border-radius:14px;text-align:center;border:1px solid var(--brd); }
        .sb.hl { background:linear-gradient(135deg,#1a3a3a,#0d2626);border-color:var(--acc); }
        [data-theme="light"] .sb.hl { background:linear-gradient(135deg,#e0f2f1,#b2dfdb); }
        .sn { font-size:1.6rem;font-weight:900;color:var(--acc); }
        .sd { font-size:.58rem;color:var(--tx2);margin-top:4px;text-transform:uppercase;letter-spacing:.5px; }

        /* ===== DAY CARDS ===== */
        .dc {
            display:flex;justify-content:space-between;align-items:center;
            background:var(--c2);padding:16px;margin:8px 0;border-radius:14px;
            border:1px solid var(--brd);cursor:pointer;touch-action:manipulation;
            transition:all .2s;min-height:68px;
        }
        .dc:active { border-color:var(--acc);transform:scale(.98); }
        .dc h4 { color:var(--acc);font-size:.95rem;margin-bottom:4px; }
        .dc span { font-size:.73rem;color:var(--tx2); }
        .dc .da { display:flex;gap:6px;align-items:center; }

        /* ===== EXERCISE CARDS ===== */
        .ex-card {
            background:var(--c1);border-radius:16px;margin:14px 0;
            border:1px solid var(--brd);overflow:hidden;
            transition:all .2s;
        }
        .ex-card:active { transform:scale(.995); }
        .ex-header {
            padding:16px;display:flex;justify-content:space-between;align-items:center;
        }
        .ex-info { flex:1;min-width:0; }
        .ex-info h4 { margin:0;font-size:1.1rem;color:var(--tx); }
        .ex-info small { color:var(--tx2);font-size:.75rem; }
        .ex-actions { display:flex;gap:6px;align-items:center; }
        .btn-icon {
            width:44px;height:44px;border-radius:12px;border:1px solid var(--brd);
            background:var(--c2);color:var(--tx);display:flex;
            align-items:center;justify-content:center;cursor:pointer;
            font-size:1.1rem;padding:0;transition:all .15s;
        }
        .btn-icon:active { transform:scale(.9); }

        /* ===== PROGRESS BAR ===== */
        .ex-progress {
            height:4px;background:var(--c3);margin:0;overflow:hidden;
        }
        .ex-progress-fill {
            height:100%;background:linear-gradient(90deg,var(--grn),#2ecc71);
            transition:width .4s cubic-bezier(.34,1.56,.64,1);border-radius:0 4px 4px 0;
        }
        .ex-progress-fill.complete {
            background:linear-gradient(90deg,var(--grn),var(--acc));
        }

        /* ===== MEDIA CONTAINER ===== */
        .media-box {
            max-height:0;overflow:hidden;transition:max-height .4s ease,padding .4s ease;
            padding:0 16px;
        }
        .media-box.open { max-height:350px;padding:0 16px 12px; }
        .media-box video,.media-box img,.media-box iframe {
            width:100%;border-radius:12px;background:#000;display:block;
        }
        .media-box iframe { aspect-ratio:16/9;border:none; }
        .yt-search {
            display:flex;align-items:center;justify-content:center;gap:8px;
            padding:20px;background:var(--c2);border-radius:12px;
            color:var(--tx2);font-size:.82rem;cursor:pointer;
            border:1px dashed var(--brd);transition:all .2s;
        }
        .yt-search:active { background:var(--c3);border-color:var(--acc);color:var(--acc); }

        /* ===== SET ROWS ===== */
        .sets-container { padding:0 16px 16px; }
        .sets-grid-header {
            display:grid;grid-template-columns:36px 1fr 1fr 52px;gap:8px;
            padding:0 4px 8px;color:var(--tx3);font-size:.65rem;
            text-transform:uppercase;font-weight:700;letter-spacing:.5px;
            text-align:center;
        }
        .set-row {
            display:grid;grid-template-columns:36px 1fr 1fr 52px;gap:8px;
            align-items:center;margin-bottom:8px;padding:8px 4px;
            border-radius:12px;transition:all .3s ease;
            background:transparent;
        }
        .set-row.done {
            background:rgba(39,174,96,.1);
        }
        .set-num {
            width:36px;height:36px;border-radius:10px;
            display:flex;align-items:center;justify-content:center;
            font-weight:800;font-size:.82rem;color:var(--tx2);
            background:var(--c2);border:1px solid var(--brd);
            transition:all .3s;
        }
        .set-row.done .set-num {
            background:var(--grn);color:#fff;border-color:var(--grn);
        }
        .set-input {
            width:100%;padding:10px 6px;text-align:center;border-radius:10px;
            border:1px solid var(--brd);background:var(--c2);color:var(--tx);
            font-size:1.05rem;font-weight:600;font-family:inherit;
            transition:all .2s;min-height:44px;
        }
        .set-input:focus { border-color:var(--acc);background:var(--c3); }
        .set-row.done .set-input {
            border-color:rgba(39,174,96,.3);
            color:var(--grn);
        }

        /* ===== CHECK BUTTON ===== */
        .set-check {
            width:48px;height:48px;border-radius:50%;border:2.5px solid var(--brd);
            background:none;color:var(--tx3);font-size:1.2rem;
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;padding:0;transition:all .25s cubic-bezier(.34,1.56,.64,1);
            flex-shrink:0;
        }
        .set-check:active { transform:scale(.85); }
        .set-check.done {
            background:var(--grn);border-color:var(--grn);color:#fff;
            box-shadow:0 4px 15px rgba(39,174,96,.35);
            transform:scale(1.05);
        }
        .set-check.done:active { transform:scale(.95); }

        /* ===== PROGRESS COUNTER ===== */
        .progress-info {
            display:flex;justify-content:space-between;align-items:center;
            padding:0 16px 8px;font-size:.72rem;
        }
        .progress-info .prog-text { color:var(--tx2); }
        .progress-info .prog-text strong { color:var(--grn); }
        .progress-info .prog-badge {
            padding:3px 10px;border-radius:20px;font-weight:700;font-size:.68rem;
        }
        .prog-badge.incomplete { background:rgba(241,196,15,.12);color:var(--yel); }
        .prog-badge.complete { background:rgba(39,174,96,.15);color:var(--grn); }

        /* ===== ADD SET BTN ===== */
        .add-set-btn {
            width:100%;padding:12px;border-radius:10px;
            border:1.5px dashed var(--brd);background:none;
            color:var(--tx2);font-weight:600;font-size:.82rem;
            margin-top:4px;transition:all .2s;min-height:44px;
        }
        .add-set-btn:active { border-color:var(--acc);color:var(--acc); }

        /* ===== ACTION BAR (Day view) ===== */
        .abar { display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px; }
        .abar button { flex:1;min-width:0;padding:12px 6px;font-size:.72rem;white-space:nowrap; }

        /* ===== VIEW MODE TOGGLE ===== */
        .mode-toggle {
            display:flex;background:var(--c2);border-radius:12px;padding:4px;
            margin-bottom:14px;border:1px solid var(--brd);
        }
        .mode-btn {
            flex:1;padding:10px;border-radius:10px;border:none;
            background:none;color:var(--tx2);font-size:.8rem;
            font-weight:600;cursor:pointer;transition:all .2s;
            min-height:40px;
        }
        .mode-btn.active {
            background:var(--acc);color:#000;
            box-shadow:0 2px 8px rgba(3,218,198,.3);
        }

        /* ===== VIEW MODE STYLES ===== */
        .view-only .set-check { display:none; }
        .view-only .sets-grid-header { grid-template-columns:36px 1fr 1fr; }
        .view-only .set-row { grid-template-columns:36px 1fr 1fr; }
        .view-only .add-set-btn { display:none; }
        .view-only .ex-progress { display:none; }
        .view-only .progress-info { display:none; }

        /* ===== MODAL ===== */
        .modal {
            display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
            z-index:10000;justify-content:center;align-items:flex-end;
        }
        @media(min-width:600px) { .modal { align-items:center; } }
        .mc {
            background:var(--c1);border-radius:22px 22px 0 0;width:100%;max-width:600px;
            max-height:90vh;overflow:hidden;display:flex;flex-direction:column;
            padding:20px 16px;padding-bottom:calc(16px + env(safe-area-inset-bottom));
            animation:slideUp .35s ease;
        }
        @media(min-width:600px) { .mc { border-radius:22px;max-height:85vh; } }
        @keyframes slideUp { from{transform:translateY(30px);opacity:0;} to{transform:translateY(0);opacity:1;} }
        .mc h2 { color:var(--acc);text-align:center;margin-bottom:14px;font-size:1.1rem; }

        /* ===== EXERCISE SELECTOR ===== */
        .exo {
            display:flex;align-items:center;gap:12px;padding:14px;
            background:var(--c2);margin:6px 0;border-radius:14px;
            cursor:pointer;border:1px solid transparent;
            touch-action:manipulation;min-height:60px;transition:all .15s;
        }
        .exo:active { border-color:var(--acc);background:var(--c3);transform:scale(.98); }
        .exo .on { font-size:.88rem;color:var(--tx);font-weight:600; }
        .exo .om { font-size:.7rem;color:var(--tx2); }
        .mch {
            display:inline-block;padding:7px 14px;border-radius:20px;
            font-size:.72rem;border:1px solid var(--brd);background:var(--c1);
            color:var(--tx2);cursor:pointer;margin:3px;white-space:nowrap;
            transition:all .15s;min-height:34px;
        }
        .mch.on { background:var(--acc);color:#000;border-color:var(--acc);font-weight:bold; }
        .chips { display:flex;overflow-x:auto;gap:4px;padding:6px 0;-webkit-overflow-scrolling:touch; }
        .chips::-webkit-scrollbar { display:none; }

        /* ===== ACHIEVEMENTS ===== */
        .ag { display:grid;grid-template-columns:repeat(2,1fr);gap:8px; }
        @media(min-width:500px) { .ag { grid-template-columns:repeat(4,1fr); } }
        .ac { padding:12px 8px;border-radius:12px;text-align:center;border:1px solid var(--brd); }
        .ac.ok { background:linear-gradient(135deg,#1a3a3a,#0d2626);border-color:var(--acc); }
        [data-theme="light"] .ac.ok { background:linear-gradient(135deg,#e0f2f1,#b2dfdb); }
        .ac.no { background:var(--c1);opacity:.3; }
        .aci { font-size:1.6rem; }
        .act { font-size:.65rem;font-weight:bold;color:var(--tx);margin-top:3px; }
        .acd { font-size:.55rem;color:var(--tx2);margin-top:2px; }

        /* ===== HISTORY ===== */
        .hd { color:var(--acc);font-size:.8rem;font-weight:bold;margin-top:16px;padding-bottom:6px;border-bottom:1px solid var(--brd); }
        .he { display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:.75rem;border-bottom:1px solid rgba(255,255,255,.03); }

        /* ===== VOLUME CHART ===== */
        #vol-chart { width:100%;height:130px;border-radius:10px;background:var(--c2); }

        /* ===== MUSCLE MAP ===== */
        .mm-grid { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px; }
        .mm-col { text-align:center; }
        .mm-col h4 { font-size:.72rem;color:var(--tx2);margin-bottom:8px;text-transform:uppercase; }
        .mm-part {
            display:inline-block;padding:6px 12px;margin:3px;border-radius:20px;
            font-size:.65rem;font-weight:600;border:1px solid var(--brd);
            background:var(--c2);color:var(--tx2);transition:all .3s;
        }
        .mm-part.active { color:#fff;border-color:transparent; }
        .mm-part.low { background:#1b5e20; }
        .mm-part.med { background:#e65100; }
        .mm-part.high { background:#b71c1c; }

        /* ===== BOTTOM NAV ===== */
        .bn {
            position:fixed;bottom:0;left:0;right:0;background:rgba(30,30,30,.95);
            border-top:1px solid var(--brd);display:flex;justify-content:space-around;
            padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:100;
            backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
        }
        [data-theme="light"] .bn { background:rgba(255,255,255,.95); }
        .bn button {
            background:none;border:none;color:var(--tx3);font-size:.55rem;
            cursor:pointer;padding:6px 16px;display:flex;flex-direction:column;
            align-items:center;gap:3px;min-width:60px;min-height:48px;
        }
        .bn button .ni { font-size:1.2rem; }
        .bn button.on { color:var(--acc); }

        /* ===== MISC ===== */
        #confetti { position:fixed;inset:0;z-index:99999;pointer-events:none; }
        .emp { text-align:center;padding:30px;color:var(--tx3); }
        .emp .eic { font-size:2.5rem;margin-bottom:8px; }
        .sph { padding:12px;background:rgba(155,89,182,.1);border:1px solid rgba(155,89,182,.2);border-radius:12px;margin-bottom:14px;font-size:.8rem;color:var(--pur2); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
        .apulse { animation:pulse 1s infinite; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
        .fade-in { animation:fadeIn .3s ease; }
        @keyframes prFlash { 0%{box-shadow:0 0 0 rgba(241,196,15,0);}50%{box-shadow:0 0 30px rgba(241,196,15,.5);}100%{box-shadow:0 0 0 rgba(241,196,15,0);} }
        .pr-flash { animation:prFlash .6s ease; }
    </style>
</head>
<body>
<canvas id="confetti"></canvas>
<div id="toast" class="toast"></div>

<!-- TOP BAR -->
<div class="topbar">
    <button class="tb" onclick="location.href='index.html'">🏠</button>
    <h1>GymTracker <span>Pro</span></h1>
    <div style="display:flex;gap:6px;align-items:center;">
        <button class="tb" onclick="toggleTheme()" id="thBtn" style="padding:8px 10px;">🌙</button>
        <span class="badge" id="ubadge"></span>
    </div>
</div>

<div class="ctn">

<!-- LOADING -->
<div id="vLoad" class="card" style="text-align:center;padding:60px 20px;">
    <div style="font-size:3rem;" class="apulse">🏋️</div>
    <p style="margin-top:12px;color:var(--tx2);">Caricamento...</p>
</div>

<!-- ===== HOME ===== -->
<div id="vHome" style="display:none;">
    <div class="card"><div class="sg">
        <div class="sb"><div class="sn" id="s0">0</div><div class="sd">Workouts</div></div>
        <div class="sb"><div class="sn" id="s1">0</div><div class="sd">Serie</div></div>
        <div class="sb"><div class="sn" id="s2">0</div><div class="sd">🔥 Streak</div></div>
        <div class="sb hl"><div class="sn" id="s3">0</div><div class="sd">🎯 PRs</div></div>
    </div></div>

    <div class="card">
        <h3>📈 Volume Settimanale</h3>
        <canvas id="vol-chart"></canvas>
    </div>

    <div class="card">
        <h3>💪 Mappa Muscolare — Oggi</h3>
        <div id="muscle-map"></div>
    </div>

    <div class="card">
        <h3>📅 Le Tue Giornate</h3>
        <div style="display:flex;gap:8px;margin-bottom:14px;">
            <input id="iDay" placeholder="es. Push, Pull, Gambe..." style="flex:1;margin:0;">
            <button class="bp" onclick="addDay()" style="white-space:nowrap;">+ Giorno</button>
        </div>
        <div id="dList"></div>
    </div>

    <div class="card"><h3>🏆 Achievements</h3><div id="aList" class="ag"></div></div>
    <div class="card"><h3>📊 Cronologia</h3><div id="hList" style="max-height:400px;overflow-y:auto;-webkit-overflow-scrolling:touch;"></div></div>
</div>

<!-- ===== DAY VIEW ===== -->
<div id="vDay" style="display:none;">
    <div class="card">
        <h3 id="dTitle" style="margin-bottom:10px;">📅 Giornata</h3>

        <!-- Mode Toggle -->
        <div class="mode-toggle">
            <button class="mode-btn active" id="modeTrack" onclick="setMode(false)">✅ Tracking</button>
            <button class="mode-btn" id="modeView" onclick="setMode(true)">📖 Solo Scheda</button>
        </div>

        <div class="abar" id="trackActions">
            <button class="bs" onclick="goHome()">← Indietro</button>
            <button class="bp" onclick="openSel()">+ Esercizio</button>
            <button class="bg" onclick="complWO()" id="btnComplete">✅ Completa</button>
        </div>

        String(dt.getMonth() + 1).padStart(2, '0') + '-' +
        String(dt.getDate()).padStart(2, '0');

let D = null, EX_DB = [], curDay = null, ssMode = false, ss1 = null, mf = 'all';

// ============================================================
// 🔥 FIREBASE LOAD/SAVE

function dSt() { return {tw:0,ts:0,te:0,pr:{},sk:0,lwd:null}; }

async function load() {

        const doc = await db.collection('gym_users').doc(MIO).get();

}

async function save() {

        await db.collection('gym_users').doc(MIO).set(D);

// ============================================================

// ============================================================

function renderAll() { if(!D)return; renSt(); renDays(); renAch(); renHist(); renVol(); renMuscle(); }

function renSt() {

function renDays() {
    const c = document.getElementById('dList');
    if (!D.days.length) {
        c.innerHTML = '<div class="emp"><div class="eic">📋</div>Nessuna giornata creata.<br><small style="color:var(--tx3)">Scrivi un nome e premi "+ Giorno"</small></div>';

// ============================================================
// ➕ ADD / REMOVE DAY (con feedback)
// ============================================================
function addDay() {
    if (!D) { toast('⏳ Caricamento in corso...', 'warn'); return; }
    const input = document.getElementById('iDay');
    const name = input.value.trim();

function remDay(id) {

// ============================================================
// 📋 DAY VIEW - RENDER
// ============================================================
function gD() { return D.days.find(d => d.id === curDay); }

function renDay() {
    const day = gD();
    if (!day) return;

    document.getElementById('dTitle').textContent = '📅 ' + day.name;

    const cont = document.getElementById('eList');
    if (!cont) return;

    if (!day.exs || day.exs.length === 0) {
        cont.innerHTML = `<div class="emp fade-in">
            <div class="eic">🏋️</div>
            Nessun esercizio ancora.<br>
            <small>Premi "+ Esercizio" per iniziare!</small>
        </div>`;
        return;
    }

    // Muscle overview
    const muscles = [...new Set(day.exs.map(e => {
        const d = exDef(e.exerciseId);
        return d ? d.bp : null;
    }).filter(Boolean))];

    let h = `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;" class="fade-in">
        ${muscles.map(m => `<span style="background:var(--c2);color:var(--acc);padding:6px 14px;border-radius:20px;font-size:.78rem;font-weight:600;border:1px solid rgba(3,218,198,.2)">${m}</span>`).join('')}
    </div>`;

    // Exercise cards
    day.exs.forEach(ex => {
        try { h += renEC(ex); } catch(e) { console.error("Render error:", ex, e); }
    });

    cont.innerHTML = h;
    cont.className = viewMode ? 'view-only' : '';
}

// ============================================================
// 🏋️ EXERCISE CARD RENDER
// ============================================================
function renEC(ex) {
    const d = exDef(ex.exerciseId);
    const mColor = d ? getMuscleColor(d.bp) : 'var(--acc)';
    const safeName = (ex.name || '').replace(/'/g, "\\'");
    const hasMedia = d && (d.video || d.gif || d.gifUrl);

    // Progress calculation
    const total = ex.sd ? ex.sd.length : 0;
    const done = ex.sd ? ex.sd.filter(s => s.done).length : 0;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    const allDone = done === total && total > 0;

    let h = `<div class="ex-card fade-in" style="border-left:5px solid ${mColor};">`;

    // Header
    h += `<div class="ex-header">
        <div class="ex-info" onclick="showProgression('${ex.exerciseId}','${safeName}')" style="cursor:pointer;">
            <h4>${ex.name}</h4>
            <small>${d ? d.bp + ' • ' + d.eq : ''}</small>
        </div>
        <div class="ex-actions">
            ${hasMedia ? `<button class="btn-icon" onclick="togVid('${ex.uid}')">🎬</button>` :
            `<button class="btn-icon" onclick="searchYT('${safeName}')">🔍</button>`}
            <button class="btn-icon" onclick="remEx('${ex.uid}')" style="color:var(--red);">🗑️</button>
        </div>
    </div>`;

    // Progress bar (solo in track mode, gestito via CSS)
    h += `<div class="ex-progress"><div class="ex-progress-fill${allDone?' complete':''}" style="width:${pct}%"></div></div>`;

    // Progress info
    if (!viewMode) {
        h += `<div class="progress-info">
            <span class="prog-text"><strong>${done}</strong>/${total} serie</span>
            <span class="prog-badge ${allDone?'complete':'incomplete'}">${allDone?'✅ Completato':'⏳ In corso'}</span>
        </div>`;
    }

    // Media container
    h += buildMediaBox(ex.uid, d);

    // Sets
    h += `<div class="sets-container">`;
    h += `<div class="sets-grid-header"><span>SET</span><span>KG</span><span>REPS</span>${!viewMode?'<span></span>':''}</div>`;

    ex.sd.forEach((s, i) => {
        const isDone = s.done;
        h += `<div class="set-row${isDone ? ' done' : ''}" id="sr-${ex.uid}-${i}">
            <div class="set-num">${i + 1}</div>
            <input type="number" inputmode="decimal" class="set-input" value="${s.w || ''}"
                   placeholder="0" oninput="updS('${ex.uid}',${i},'w',this.value)">
            <input type="number" inputmode="numeric" class="set-input" value="${s.r || ''}"
                   placeholder="0" oninput="updS('${ex.uid}',${i},'r',this.value)">
            ${!viewMode ? `
            <button class="set-check${isDone?' done':''}" onclick="chkSet('${ex.uid}',${i},this)">
                ${isDone ? '✓' : ''}
            </button>` : ''}
        </div>`;
    });

    h += `<button class="add-set-btn" onclick="addSet('${ex.uid}')">+ Aggiungi Serie</button>`;
    h += `</div></div>`;

    return h;
}

// ============================================================
// 🎨 HELPERS
// ============================================================
function getMuscleColor(bp) {
    const map = {
        'Chest':'#ff4757','Back':'#3742fa','Shoulders':'#ffa502',
        'Upper Arms':'#ff6b81','Upper Legs':'#2ed573','Lower Legs':'#7bed9f',
        'Waist':'#eccc68','Cardio':'#e74c3c','Neck':'#a29bfe',
        'Lower Arms':'#fd79a8'
    };
    return map[bp] || '#03dac6';
}

function buildMediaBox(exUid, def) {
    if (!def) return '';
    const vid = def.video;
    const gif = def.gifUrl || def.gif;

    if (!vid && !gif) return '';

    let content = '';

    if (vid) {
        const url = vid.startsWith('http') ? vid : MEDIA_PATH + vid;
        if (url.includes('youtube.com') || url.includes('youtu.be')) {
            let embed = url;
            if (url.includes('youtu.be/')) embed = url.replace('youtu.be/', 'youtube.com/embed/');
            else if (url.includes('watch?v=')) embed = url.replace('watch?v=', 'embed/');
            content = `<iframe data-src="${embed}" allowfullscreen style="aspect-ratio:16/9;"></iframe>`;
        } else {
            content = `<video loop muted playsinline controls preload="none"><source src="${url}" type="video/mp4"></video>`;
        }
    } else if (gif) {
        const url = gif.startsWith('http') ? gif : MEDIA_PATH + gif;
        content = `<img src="${url}" alt="Demo" loading="lazy" style="max-height:280px;object-fit:contain;">`;
    }

    return `<div class="media-box" id="media-${exUid}">${content}</div>`;
}

function searchYT(name) {
    window.open('https://www.youtube.com/results?search_query=' + encodeURIComponent(name + ' exercise form'), '_blank');
}

// ============================================================
// 🎬 VIDEO TOGGLE
// ============================================================
function togVid(exUid) {
    const box = document.getElementById('media-' + exUid);
    if (!box) return;
    const isOpen = box.classList.toggle('open');

    if (isOpen) {
        const video = box.querySelector('video');
        if (video) video.play().catch(() => {});

        const iframe = box.querySelector('iframe');
        if (iframe && iframe.dataset.src && !iframe.src.includes('http')) {
            iframe.src = iframe.dataset.src;
        }
    } else {
        const video = box.querySelector('video');
        if (video) video.pause();

        const iframe = box.querySelector('iframe');
        if (iframe) iframe.src = '';
    }
}

// ============================================================
// ✏️ SET OPERATIONS
// ============================================================
function fEx(u) { const d = gD(); return d?.exs?.find(e => e.uid === u); }

function updS(exUid, idx, field, val) {
    const ex = fEx(exUid);
    if (ex && ex.sd[idx]) {
        ex.sd[idx][field] = parseFloat(val) || 0;
        save();
    }
}

function chkSet(exUid, idx, btn) {
    const ex = fEx(exUid);
    if (!ex || !ex.sd[idx]) return;
    const s = ex.sd[idx];
    s.done = !s.done;

    // Haptic
    if (navigator.vibrate) navigator.vibrate(s.done ? [20, 10, 20] : 15);

    // Update button
    btn.classList.toggle('done', s.done);
    btn.textContent = s.done ? '✓' : '';

    // Update row
    const row = document.getElementById('sr-' + exUid + '-' + idx);
    if (row) row.classList.toggle('done', s.done);

    // Update progress bar and counter
    const total = ex.sd.length;
    const done = ex.sd.filter(x => x.done).length;
    const pct = Math.round((done / total) * 100);
    const card = btn.closest('.ex-card');
    if (card) {
        const fill = card.querySelector('.ex-progress-fill');
        if (fill) {
            fill.style.width = pct + '%';
            fill.classList.toggle('complete', done === total);
        }
        const progText = card.querySelector('.prog-text');
        if (progText) progText.innerHTML = '<strong>' + done + '</strong>/' + total + ' serie';
        const progBadge = card.querySelector('.prog-badge');
        if (progBadge) {
            const allDone = done === total;
            progBadge.className = 'prog-badge ' + (allDone ? 'complete' : 'incomplete');
            progBadge.textContent = allDone ? '✅ Completato' : '⏳ In corso';
        }
    }

    save();

    // Toast when exercise completed
    if (ex.sd.every(x => x.done)) {
        toast('💪 ' + ex.name + ' completato!', 'ok', 1800);
    }
}

function addSet(u) {
    const e = fEx(u);
    if (!e) return;
    const last = e.sd.length ? e.sd[e.sd.length - 1] : {r: 10, w: 0};
    e.sd.push({r: last.r, w: last.w, done: false});
    save(); renDay();
}

function remEx(u) {
    const ex = fEx(u);
    if (!ex) return;
    if (!confirm('Rimuovere "' + ex.name + '"?')) return;
    const d = gD();
    d.exs = d.exs.filter(e => e.uid !== u);
    save(); renDay();
    toast('🗑️ Esercizio rimosso', 'info');
}

// ============================================================
// 📋 EXERCISE SELECTOR
// ============================================================
function openSel() {
    document.getElementById('mSel').style.display = 'flex';
    document.getElementById('mChips').innerHTML = BPARTS.map(m =>
        `<span class="mch${mf===m?' on':''}" onclick="mf='${m}';openSel();">${m === 'all' ? '🏷️ Tutti' : m}</span>`
    ).join('');
    filEx();
    setTimeout(() => document.getElementById('exQ').focus(), 350);
}

function closeSel() {
    document.getElementById('mSel').style.display = 'none';
    document.getElementById('exQ').value = '';
    mf = 'all';
}

function fuzzyMatch(text, query) {
    text = text.toLowerCase(); query = query.toLowerCase();
    let ti = 0, qi = 0;
    while (ti < text.length && qi < query.length) {
        if (text[ti] === query[qi]) qi++;
        ti++;
    }
    return qi === query.length;
}

function filEx() {
    const q = document.getElementById('exQ').value.toLowerCase();
    let res = EX_DB;
    if (mf !== 'all') res = res.filter(e => (e.bp || '').toLowerCase() === mf);
    if (q) res = res.filter(e => fuzzyMatch([e.name, e.bp, e.eq, e.tgt || ''].join(' '), q));

    document.getElementById('exR').innerHTML = res.length
        ? res.slice(0, 50).map(e => `
        <div class="exo" onclick="addEx('${e.id}')">
            <div style="flex:1">
                <div class="on">${e.name}</div>
                <div class="om">${e.bp} • ${e.eq}</div>
            </div>
            <span style="color:var(--acc);font-weight:bold;font-size:.82rem;">+ Aggiungi</span>
        </div>`).join('')
        : '<div class="emp">Nessun risultato</div>';
}

function getLast(eid) {
    if (!D.hist) return null;
    return D.hist.filter(x => x.eid === eid).sort((a, b) => new Date(b.dt) - new Date(a.dt))[0] || null;
}

function addEx(eid) {
    const d = exDef(eid), day = gD();
    if (!d || !day) return;
    const l = getLast(eid);
    const sd = l && l.sd
        ? l.sd.map(s => ({...s, done: false}))
        : [{r:10,w:0,done:false}, {r:10,w:0,done:false}, {r:10,w:0,done:false}];
    day.exs.push({
        uid: uid(), exerciseId: eid, name: d.name, sd,
        rest: l?.rest || 90, seat: l?.seat || '', notes: l?.notes || '',
        ssG: null, pF: false
    });
    save(); closeSel(); renDay();
    toast('✅ ' + d.name + ' aggiunto!', 'ok', 1500);
    if (navigator.vibrate) navigator.vibrate(30);
}

// ============================================================
// ✅ COMPLETE WORKOUT
// ============================================================
function complWO() {
    const day = gD();
    if (!day || !day.exs.length) {
        toast('⚠️ Aggiungi almeno un esercizio!', 'warn');
        return;
    }

    const totalSetsAll = day.exs.reduce((a, e) => a + (e.sd ? e.sd.length : 0), 0);
    const doneSetsAll = day.exs.reduce((a, e) => a + (e.sd ? e.sd.filter(x => x.done).length : 0), 0);

    if (doneSetsAll === 0) {
        if (!confirm('Nessuna serie segnata come fatta. Completare comunque?')) return;
    } else if (doneSetsAll < totalSetsAll) {
        if (!confirm(`Hai completato ${doneSetsAll}/${totalSetsAll} serie. Terminare l'allenamento?`)) return;
    } else {
        if (!confirm('Tutte le serie completate! Salvare?')) return;
    }

    const today = toLocalDate(new Date());
    const yest = toLocalDate(new Date(Date.now() - 864e5));
    const s = D.st;
    let newPR = false;

    if (s.lwd === yest) s.sk = (s.sk || 0) + 1;
    else if (s.lwd !== today) s.sk = 1;
    s.lwd = today;
    s.tw = (s.tw || 0) + 1;
    s.ts = (s.ts || 0) + doneSetsAll;
    s.te = (s.te || 0) + day.exs.length;
    if (!s.pr) s.pr = {};

    day.exs.forEach(e => {
        const doneS = e.sd ? e.sd.filter(x => x.done) : [];
        const maxW = doneS.length ? Math.max(...doneS.map(x => parseFloat(x.w) || 0)) : 0;
        if (maxW > (s.pr[e.exerciseId] || 0)) { s.pr[e.exerciseId] = maxW; newPR = true; }
        const avgR = doneS.length ? Math.round(doneS.reduce((a, x) => a + (parseInt(x.r) || 0), 0) / doneS.length) : 0;
        D.hist.push({
            eid: e.exerciseId, name: e.name, dt: new Date().toISOString(),
            s: doneS.length, r: avgR, w: maxW, rest: e.rest,
            seat: e.seat, notes: e.notes,
            sd: e.sd.map(x => ({r: x.r, w: x.w}))
        });
    });

    // Reset sets
    day.exs.forEach(e => { if (e.sd) e.sd.forEach(s => s.done = false); });

    save(); goHome();

    if (newPR) {
        toast('🎉 NUOVO PERSONAL RECORD!', 'ok', 3500);
        fireConfetti();
    } else {
        toast('✅ Allenamento salvato! 💪', 'ok', 2500);
    }
}

// ============================================================
// 📈 VOLUME CHART
// ============================================================
function renVol() {
    const canvas = document.getElementById('vol-chart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    canvas.width = canvas.offsetWidth * dpr;
    canvas.height = 130 * dpr;
    ctx.scale(dpr, dpr);
    const W = canvas.offsetWidth, H = 130;

    const now = new Date();
    const dow = now.getDay();
    const diffToMon = dow === 0 ? -6 : 1 - dow;
    const monday = new Date(now);
    monday.setDate(now.getDate() + diffToMon);
    monday.setHours(0, 0, 0, 0);

    const todayStr = toLocalDate(now);
    const labels = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
    const days = [];

    for (let i = 0; i < 7; i++) {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        const key = toLocalDate(d);
        let vol = 0;
        if (D.hist) {
            D.hist.forEach(l => {
                if (!l.dt) return;
                if (toLocalDate(l.dt) === key) {
                    vol += (l.s || 0) * (l.r || 0) * (l.w || 0);
                }
            });
        }
        days.push({label: labels[i], vol, isToday: key === todayStr});
    }

    const maxV = Math.max(...days.map(d => d.vol), 1);
    const barW = (W / 7) - 10;
    ctx.clearRect(0, 0, W, H);

    days.forEach((d, i) => {
        const x = i * (W / 7) + 6;
        const barH = Math.max(4, (d.vol / maxV) * (H - 45));
        const y = H - 30 - barH;

        const grad = ctx.createLinearGradient(x, y, x, H - 25);
        if (d.isToday) { grad.addColorStop(0, '#f1c40f'); grad.addColorStop(1, '#e67e22'); }
        else if (d.vol > 0) { grad.addColorStop(0, '#03dac6'); grad.addColorStop(1, '#018786'); }
        else { grad.addColorStop(0, '#333'); grad.addColorStop(1, '#222'); }

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(x, y, barW, barH, 5);
        ctx.fill();

        ctx.fillStyle = d.isToday ? '#f1c40f' : '#888';
        ctx.font = (d.isToday ? 'bold ' : '') + '9px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(d.label, x + barW / 2, H - 8);

        if (d.vol > 0) {
            ctx.fillStyle = d.isToday ? '#f1c40f' : '#03dac6';
            ctx.font = 'bold 8px sans-serif';
            const txt = d.vol >= 10000 ? (d.vol / 1000).toFixed(0) + 'k' : Math.round(d.vol);
            ctx.fillText(txt, x + barW / 2, y - 5);
        }
    });
}
window.addEventListener('resize', () => { if(D) renVol(); });

// ============================================================
// 💪 MUSCLE MAP
// ============================================================
function renMuscle() {
    const c = document.getElementById('muscle-map');
    if (!c) return;
    const today = toLocalDate(new Date());
    const todayLogs = D.hist ? D.hist.filter(l => toLocalDate(l.dt) === today) : [];
    const bpVol = {};
    todayLogs.forEach(l => {
        const def = exDef(l.eid);
        if (!def) return;
        const vol = (l.s||0) * (l.r||0) * (l.w||1);
        const bp = def.bp || 'other';
        bpVol[bp] = (bpVol[bp]||0) + vol;
        if (def.tgt) bpVol[def.tgt] = (bpVol[def.tgt]||0) + vol;
    });
    const maxVol = Math.max(...Object.values(bpVol), 1);
    function intensity(name) {
        const v = bpVol[name] || bpVol[name.toLowerCase()] || 0;
        if (!v) return '';
        const pct = v / maxVol;
        if (pct > .6) return 'active high';
        if (pct > .3) return 'active med';
        return 'active low';
    }
    const front = ['chest','shoulders','upper arms','lower arms','waist','upper legs','lower legs'];
    const back = ['back','neck','waist','upper legs','lower legs','glutes'];

    if (!todayLogs.length) {
        c.innerHTML = '<div class="emp" style="padding:15px;"><div class="eic">💪</div>Allena oggi per vedere la mappa muscolare</div>';
        return;
    }
    let h = `<div class="mm-grid"><div class="mm-col"><h4>Anteriore</h4>`;
    front.forEach(m => { h += `<span class="mm-part ${intensity(m)}">${m}</span> `; });
    h += `</div><div class="mm-col"><h4>Posteriore</h4>`;
    back.forEach(m => { h += `<span class="mm-part ${intensity(m)}">${m}</span> `; });
    h += `</div></div>`;
    c.innerHTML = h;
}

// ============================================================
// 🎊 CONFETTI
// ============================================================
function fireConfetti() {
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    canvas.style.display = 'block';
    const particles = [];
    const colors = ['#f1c40f','#e74c3c','#3498db','#2ecc71','#9b59b6','#ff69b4','#03dac6'];
    for (let i = 0; i < 150; i++) {
        particles.push({
            x: Math.random()*canvas.width, y: Math.random()*canvas.height*0.5 - canvas.height*0.3,
            vx: (Math.random()-0.5)*8, vy: Math.random()*3+2,
            w: Math.random()*10+4, h: Math.random()*6+2,
            color: colors[Math.floor(Math.random()*colors.length)],
            rot: Math.random()*360, rv: (Math.random()-0.5)*10, life: 1
        });
    }
    let frame = 0;
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;
        particles.forEach(p => {
            if (p.life <= 0) return; alive = true;
            p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.rot += p.rv; p.life -= 0.008;
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot*Math.PI/180);
            ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, p.life);
            ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h); ctx.restore();
        });
        frame++;
        if (alive && frame < 300) requestAnimationFrame(animate);
        else { ctx.clearRect(0,0,canvas.width,canvas.height); canvas.style.display = 'none'; }
    }
    animate();
}
